# UAE FLSC 2018 - Chapter 3: Means of Egress
meta:
  code: "UAE FLSC 2018 (CDGH-OP-25, September 2018)"
  chapter: 3
  chapter_title: "Means of Egress"

# ---------- GENERAL: applies to all occupancies (Tables 3.1 / 3.2 / 3.3) ----
general:
  - id: moe_g_general_specs
    when:
      occupancy_not: [villa_private, villa_commercial]
    systems:
      - name: "Means of Egress - General Performance"
        spec: "Head room ≥ 2285 mm clear; walking surfaces slip-resistant; abrupt elevation changes ≤ 6.3 mm; guards on open sides"
        code_ref: "Ch 3, #3.1 / Table 3.1"
        page_ref: "p.249-250"
        detail: "Egress paths shall be free of obstructions and continuously maintained for full instant use during fire / emergency."

  - id: moe_g_door_minimums
    when:
      occupancy_not: [villa_private, villa_commercial]
    systems:
      - name: "Door Assembly Minimums (Table 3.2)"
        spec: "Min width 915 mm; max opening force 67 N; door swing in egress direction (50+ occupants); panic / fire-exit hardware on fire-rated assemblies"
        code_ref: "Ch 3, #3.2 / Table 3.2"
        page_ref: "p.250-260"
        detail: "Side-hinged or pivoted swinging doors required. Panic hardware (or fire-exit hardware on fire-rated doors) bar between 865-1220 mm AFFL. Doors readily operable from egress side without keys, tools or special knowledge."

  - id: moe_g_exit_remoteness
    when:
      occupancy_not: [villa_private, villa_commercial]
    systems:
      - name: "Exit Remoteness (Table 3.15.a)"
        spec: "Sprinklered: 1/3 floor diagonal; non-sprinklered: 1/2 floor diagonal between exits"
        code_ref: "Ch 3, #4.4 / Table 3.15.a"
        page_ref: "p.288"
        detail: "Lowrise/midrise: shortest walking distance between exits. Highrise/super-highrise sprinklered: straight-line between centres of exit doors."

  - id: moe_g_required_exits
    when:
      occupancy_not: [villa_private, villa_commercial]
    systems:
      - name: "Number of Means of Egress (Table 3.14)"
        spec: "≥ 2 exits per floor; OL 500-1000 → ≥ 3 exits; OL > 1000 → ≥ 4 exits; outdoor OL > 6,000 → 3, > 9,000 → 4"
        code_ref: "Ch 3, #4.3 / Table 3.14"
        page_ref: "p.288"
        detail: "Calculate occupant load (OL) from GFA / occupant-load-factor for the occupancy (Table 3.13), then size number of exits per these tiers. Balconies and mezzanines also require minimum 2 means of egress."

  - id: moe_g_stair_geometry
    when:
      occupancy_not: [villa_private, villa_commercial]
    systems:
      - name: "Stair Geometry (Ch 3, #3.3)"
        spec: "Tread depth ≥ 280 mm; riser height 100-178 mm uniform; head room on stairs ≥ 2,030 mm; max height between landings 3,660 mm"
        code_ref: "Ch 3, #3.3"
        page_ref: "p.265-275"
        detail: "Aisle stairs in assembly: tread ≥ 280 mm, riser 100-205 mm. Standard stair limits stricter (riser ≤ 178 mm). Stair handrails on both sides for stairs > 1,120 mm wide; intermediate handrails for very wide stairs."

  - id: moe_g_basement_parking_egress
    when:
      floors_below_grade_gt: 0
    systems:
      - name: "Basement / Parking Podium Travel Distance (Table 3.15.b)"
        spec: "Sprinklered enclosed basement parking: max 61 m travel + 15 m commonpath / dead-end. Non-sprinklered: 46 m travel + 15 m. Open podium parking: 122 m travel + 15 m."
        code_ref: "Ch 3, #4.4.8 / Table 3.15.b"
        page_ref: "p.291"
        detail: "Applies to basements and enclosed podiums used only for vehicle parking and service rooms (generator, server, battery, service rooms)."

# ---------- BRANCHES: by occupancy - Tables 3.13 (OLF) + 3.16 (T/D/C) ------
branches:
  # ------ Assembly ------
  - id: moe_assembly
    match: {occupancy_in: [assembly_a, assembly_b, assembly_c]}
    section: "Ch 3, #4 + #5.1 / Tables 3.13.1 + 3.16.1"
    page: "p.285, 293"
    systems:
      - name: "Occupant Load Factor (Assembly)"
        spec: "Concentrated 0.65 m² net (0.9 m² for prayer rooms); Less concentrated 1.4 m² net; Bench seating 455 mm linear; Fixed seating: count of seats; Kitchens 9.3 m²"
        detail: "Use the most representative factor for each space. Stair capacity 7.6 mm/person; ramp 5 mm/person."
      - name: "Travel / Dead-end / Commonpath (Assembly)"
        spec: "≤ 50 people: commonpath 23 m; > 50: commonpath 6.1 m. Dead-end 6.1 m. Travel distance: sprinklered 76 m / non-sprinklered 61 m. Smoke-protected seating: travel 122 m sprinklered."
        detail: "Smoke-protected seating allows extended travel and 21-rows dead-end. Exhibition booth to exit access: 15 m."
      - name: "Aisle Width (Assembly Seating)"
        spec: "Both-side seating: ≥ 1200 mm; one-side seating: ≥ 915 mm; ≤ 50 people: ≥ 915 mm. Aisle dead-end max 6.1 m. Aisle stairs: tread ≥ 280 mm, riser 100-205 mm uniform."
        code_ref: "Ch 3, #5.1 / Table 3.17"
        page_ref: "p.298"

  # ------ Business ------
  - id: moe_business
    match: {occupancy: business}
    section: "Ch 3, #4 + #5.2 / Tables 3.13.2 + 3.16.2"
    page: "p.285, 293"
    systems:
      - name: "Occupant Load Factor (Business)"
        spec: "Regular office 9.3 m²; Concentrated office 4.6 m²; Air-traffic-control observation 3.7 m²"
      - name: "Travel / Dead-end / Commonpath (Business)"
        spec: "Commonpath: sprinklered 30 m / non-sprinklered 23 m. Dead-end: sprinklered 15 m / non-sprinklered 6.1 m. Travel distance: sprinklered 91 m / non-sprinklered 61 m"

  # ------ Educational ------
  - id: moe_education
    match: {occupancy_in: [education_a, education_b, education_c]}
    section: "Ch 3, #4 + #5.3 / Tables 3.13.3 + 3.16.3"
    page: "p.285, 293"
    systems:
      - name: "Occupant Load Factor (Educational)"
        spec: "Classroom 1.9 m² net; Shops / labs / vocational 4.6 m² net"
      - name: "Travel / Dead-end / Commonpath (Educational)"
        spec: "Classroom: commonpath sprinklered 30 m / non 23 m. Dead-end sprinklered 15 m / non 6.1 m. Travel sprinklered 61 m / non 46 m. Shops/labs travel sprinklered 76 m / non 46 m."
      - name: "Single Exit Stair NOT Permitted"
        required: not_required
        detail: "Single exit stair shall not be permitted in educational occupancies (per #5.3)."

  # ------ Healthcare ------
  - id: moe_healthcare
    match: {occupancy: healthcare_a}
    section: "Ch 3, #4 + #5.4 / Tables 3.13.4-5 + 3.16.4-5"
    page: "p.286, 293"
    systems:
      - name: "Occupant Load Factor (Healthcare)"
        spec: "Inpatient 22.3 m²; Sleeping 11.1 m²; Consultation 9.3 m²; Clinics 9.3 m²; Limited care 9.3 m²; Smoke compartment crossing 2.8 m² net; Ambulatory 13 m²"
      - name: "Travel / Dead-end / Commonpath (Healthcare)"
        spec: "Hospitals/sleeping: commonpath 30 m, dead-end 9.1 m, travel 61 m (sprinklered). Clinics: commonpath sprinklered 30 m / non 23 m, dead-end sprinklered 15 m / non 6.1 m, travel sprinklered 91 m / non 61 m. Suite-to-exit-door 30 m. Suite-to-exit-stair 61 m. Sleeping-room to room main door 15 m."

  # ------ Residential ------
  - id: moe_residential
    match: {occupancy_in: [residential, labour_accommodation, staff_accommodation, hostel]}
    section: "Ch 3, #4 + #5.5 / Tables 3.13.6-7 + 3.16.6-7"
    page: "p.286, 293"
    systems:
      - name: "Occupant Load Factor (Residential)"
        spec: "Apartments / staff accommodation / hostels / labour accommodation: 18.6 m² gross"
      - name: "Travel / Dead-end / Commonpath (Residential)"
        spec: "Apartment main door to exit: commonpath sprinklered 15 m / non 10.7 m. Dead-end sprinklered 15 m / non 10.7 m. Travel sprinklered 61 m / non 30 m. Within apartment to main door: travel sprinklered 38 m / non 23 m. Other than dwelling to exit stair: travel sprinklered 76 m / non 61 m."

  # ------ Hotel ------
  - id: moe_hotel
    match: {occupancy_in: [hotel_a, hotel_b, hotel_c]}
    section: "Ch 3, #4 + #5.9 / Tables 3.13.11 + 3.16"
    page: "p.286, 294"
    systems:
      - name: "Occupant Load Factor (Hotel)"
        spec: "Hotel apartments / guest rooms: 18.6 m² gross"
      - name: "Travel / Dead-end / Commonpath (Hotel)"
        spec: "Same as residential apartments per Table 3.16: commonpath sprinklered 15 m / non 10.7 m, dead-end sprinklered 15 m / non 10.7 m, travel sprinklered 76 m / non 61 m"

  # ------ Mercantile / Mall ------
  - id: moe_mercantile
    match: {occupancy_in: [mercantile_a, mercantile_b]}
    section: "Ch 3, #4 + #5.11 / Tables 3.13.13 + 3.16"
    page: "p.286"
    systems:
      - name: "Occupant Load Factor (Mercantile)"
        spec: "Sales below street: 2.8 m². Sales street floor: 2.8 m². Sales above street: 5.6 m². Two-or-more-street-floors: 3.7 m². Office areas only: 9.3 m². Goods areas (no public): 27.9 m²"
      - name: "Travel / Common-path / Dead-end (Mercantile A/B/C - Table 3.16 row 13)"
        spec: "Travel: S 76 m, NS 46 m  |  Common-path: S 30 m, NS 23 m  |  Dead-end: S 15 m, NS 6.1 m"
        detail: "Mercantile sub-row 'Open air' has 0 m commonpath / dead-end and NA travel. HIGH HAZARD Mercantile (e.g. fireworks / aerosol retail): 0 m commonpath, 15/6.1 m dead-end, 23 m travel BOTH sprinklered and non-sprinklered (no sprinkler benefit)."

  - id: moe_mall
    match: {occupancy_in: [mall_covered, mall_open, mall_mixed]}
    section: "Ch 3, #4 + #5.12 / Tables 3.13.14 + 3.16"
    page: "p.287"
    systems:
      - name: "Occupant Load Factor (Mall)"
        spec: "Gross leasable area < 14,000 m²: 2.8 m². ≥ 14,000 m²: 3.3 m². Add 0.1 m² per 1,290 m² increment, capped at 5.1 m²/person."
      - name: "Travel / Common-path / Dead-end (Mall - Table 3.16 rows 14-15)"
        spec: "COVERED MALL: Travel S 120 m, NS 46 m  |  Common-path S 30 m, NS 23 m  |  Dead-end S 15 m, NS 6.1 m. Within tenant space (when pedestrian way per Table 3.33): Travel S 76 m, NS 46 m. OPEN AIR MALL: 0/0/NA (no internal egress limits)."
        detail: "Mall covered: 122 m sprinklered travel matches Ch 10 SC mall circulation interval (smoke curtains every 122 m). Tenant spaces inside the mall envelope follow the standard mercantile travel distances when a designated pedestrian way is provided per Table 3.33."

  # ------ Daycare ------
  - id: moe_daycare
    match: {occupancy_in: [daycare_a, daycare_b, daycare_c]}
    section: "Ch 3, #4 + #5.10 / Tables 3.13.12 + 3.16"
    page: "p.286"
    systems:
      - name: "Occupant Load Factor (Daycare)"
        spec: "3.3 m² net. Stair capacity 10 mm/person (wider than 7.6 mm standard); ramp 5 mm/person"
        detail: "10 mm/person stair-capacity factor reflects slower self-preservation of young children."
      - name: "Travel / Common-path / Dead-end (Daycare - Table 3.16 row 12)"
        spec: "Any room door to exit: Travel S 46 m, NS 30 m  |  Common-path S 30 m, NS 23 m  |  Dead-end S 15 m, NS 6.1 m. Any point in room to exit: S 61 m, NS 46 m. Any point to room door: S 30 m, NS 15 m (NA commonpath/dead-end)"

  # ------ Detention ------
  - id: moe_detention
    match: {occupancy_in: [detention_a, detention_b, detention_c]}
    section: "Ch 3, #4 + #5.8 / Tables 3.13.10 + 3.16"
    page: "p.286"
    systems:
      - name: "Occupant Load Factor (Detention)"
        spec: "11.1 m² gross"
      - name: "Travel / Common-path / Dead-end (Detention - Table 3.16 row 10)"
        spec: "Types II/III/IV: Travel S 61 m, NS 46 m  |  Common-path S 30 m, NS 15 m  |  Dead-end S 15 m, NS 6.1 m. Type V (combustible): same travel/commonpath but Dead-end S 6.1 m, NS 6.1 m. Any room access door to exit: S 46 m, NS 46 m travel."
        detail: "Detention requires supervised evacuation. Type V (combustible construction) tightens the dead-end limit to 6.1 m even when sprinklered."

  # ------ Storage / Industrial ------
  - id: moe_storage_industrial_ordinary
    match: {occupancy: storage_industrial, hazard_class_in: [LH, OH1, OH2]}
    section: "Ch 3, #4 + #5.14-15 / Tables 3.13.16, 3.13.18 + 3.16"
    page: "p.287"
    systems:
      - name: "Occupant Load Factor (Ordinary-hazard Storage / Industrial)"
        spec: "Storage Group B/C (low/ordinary): 27.9 m². Industrial Group B/C (general low-hazard): 9.3 m². Stair capacity 7.6 mm/person; ramp 5 mm/person"
      - name: "Travel / Common-path / Dead-end (LH/OH Storage + Industrial - Table 3.16 rows 17, 19)"
        spec: "Storage LH/OH: Travel S 122 m, NS 61 m  |  Common-path S 30 m, NS 15 m  |  Dead-end S 30 m, NS 15 m. Industrial Group B/C General LH: Travel S 75 m, NS 61 m. Industrial Special Purpose: Travel S 122 m, NS 91 m. Mechanical / Boiler / Furnace rooms: Travel S 75 m, NS 61 m. Aircraft Storage / Servicing GF: Travel S 30 m, NS 23 m. Aircraft Storage / Servicing Mezzanine: Travel S 23 m, NS 23 m."
        detail: "Common-path AND dead-end use the same value (30 m / 15 m) for storage - unusual. For aircraft hangers, travel distances are tightened irrespective of sprinkler protection."

  - id: moe_storage_industrial_high_hazard
    match: {occupancy: storage_industrial, hazard_class_is: HH}
    section: "Ch 3, #4 + #5.14-15 / Tables 3.13.15, 3.13.17 + 3.16"
    page: "p.287"
    systems:
      - name: "Occupant Load Factor (High-hazard Storage / Industrial)"
        spec: "Storage Group A (high-hazard): 27.9 m². Industrial Group A (high-hazard): 9.3 m². Stair capacity 18 mm/person; ramp 10 mm/person"
        detail: "High-hazard occupancies use ENLARGED stair / ramp capacity factors (18 mm vs 7.6 mm; 10 mm vs 5 mm) to permit faster egress under accelerated fire-development conditions."
      - name: "Travel / Common-path / Dead-end (HH Storage + Industrial - Table 3.16 rows 16, 18)"
        spec: "HH Storage: Common-path 0 m  |  Dead-end 0 m  |  Travel S 30 m, NS 23 m. HH Industrial: Common-path 0 m  |  Dead-end 0 m  |  Travel S 23 m, NS 0 m (NS = HH industrial NOT permitted without sprinklers)."
        detail: "ZERO common-path and ZERO dead-end for HH (no sprinkler discount) - every workstation must have direct exit access. HH industrial without sprinklers is NOT permitted under Table 3.16. Travel distances drastically shorter than ordinary storage (23-30 m vs 61-122 m)."

  # ------ Parking ------
  - id: moe_parking_enclosed
    match: {occupancy: parking_enclosed}
    section: "Ch 3, #4 + #5.16 / Tables 3.13.19 + 3.15.b items i-ii"
    page: "p.287, 291"
    systems:
      - name: "Occupant Load Factor (Enclosed Parking)"
        spec: "27.9 m² gross. Stair capacity 7.6 mm/person; ramp 5 mm/person"
      - name: "Travel Distance (Enclosed Parking - sprinklered)"
        spec: "Max 61 m travel from most remote parking lot to exit door (along natural path)"
        detail: "Per Table 3.15.b item i. Dead-end and commonpath shall not exceed 15 m. Walking distance from most remote parking lot, along natural path of travel to an exit."
      - name: "Travel Distance (Enclosed Parking - non-sprinklered)"
        spec: "Max 46 m travel from most remote parking lot to exit door"
        detail: "Per Table 3.15.b item ii. Dead-end and commonpath shall not exceed 15 m. Applies when enclosed basement/podium parking is NOT sprinklered. Buildings without sprinklers tighten the egress envelope by 15 m."
      - name: "Mechanical / Robotic Parking OLF"
        spec: "46.5 m² (Table 3.13.20) - higher OLF reflects fewer occupants"

  - id: moe_parking_open
    match: {occupancy: parking_open}
    section: "Ch 3, #4 + #5.16 / Tables 3.13.19 + 3.15.b items iii-iv"
    page: "p.287, 291"
    systems:
      - name: "Occupant Load Factor (Open Parking)"
        spec: "27.9 m² gross. Stair capacity 7.6 mm/person; ramp 5 mm/person"
      - name: "Travel Distance (Open Podium Parking)"
        spec: "Max 122 m travel from most remote parking lot to exit door (sprinklered or non-sprinklered)"
        detail: "Per Table 3.15.b items iii-iv. Dead-end and commonpath shall not exceed 15 m. Open podium parking benefits from natural ventilation - the longer travel distance acknowledges the much lower smoke / heat hazard."
      - name: "Open-parking definition (Ch 1, Table 1.9.34)"
        detail: "To qualify as 'open parking' the structure must have permanent wall openings ≥ 0.4 m² per linear metre of exterior perimeter, distributed over 40% of perimeter or uniformly on at least two opposing sides; interior wall lines / column lines ≥ 20% open. Any part of parking within 30 m of permanent natural ventilation opening."

  # ------ Animal housing ------
  - id: moe_animal_housing
    match: {occupancy: animal_housing}
    section: "Ch 3, #4 / Table 3.13.21 + 3.16"
    page: "p.287"
    systems:
      - name: "Occupant Load Factor (Animal Housing)"
        spec: "11.1 m²"
      - name: "Travel / Common-path / Dead-end (Animal Housing - Table 3.16 row 22)"
        spec: "Travel S 91 m, NS 61 m  |  Common-path S 30 m, NS 23 m  |  Dead-end S 15 m, NS 6.1 m"
        detail: "Animal housing matches typical hotel/business travel distances. Sprinklered benefit applies normally (15 m dead-end vs 6.1 m non-sprinklered)."

  # ------ Villas (no MOE numerical requirements) ------
  - id: moe_villa
    match: {occupancy_in: [villa_private, villa_commercial]}
    section: "Ch 3, #4 + #5.6-7 / Table 3.13.8-9"
    page: "p.286"
    systems:
      - name: "Means of Egress - Villa"
        required: not_required
        detail: "Private and commercial villas have no occupant-load-factor or numerical means-of-egress requirements per Table 3.13.8-9 and Table 3.16.8-9. Standard residential best-practice egress applies (single primary exit + secondary escape route from upper floors)."
