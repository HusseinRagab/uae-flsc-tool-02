        required: not_required
        detail: "Private and commercial villas have no occupant-load-factor or numerical means-of-egress requirements per Table 3.13.8-9 and Table 3.16.8-9. Standard residential best-practice egress applies (single primary exit + secondary escape route from upper floors)."
