      - name: "Hose Reel System (throughout)"
        spec: "Per Section 3.3"
      - name: "Dry Landing Valves"
        required: not_required
      - name: "Fire Pump (Tier 2 LH)"
        spec: "250 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank (Tier 2)"
        spec: "45 minutes duration"
      - name: "MSDS Review (DESIGNER OBLIGATION)"
        spec: "Per Section 4.11 preamble"

  - id: storage_industrial_tier3_lh
    match: {occupancy: storage_industrial, hazard_class_in: [LH], ground_floor_bua_m2_gte: 900, ground_floor_bua_m2_lte: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_single_tenant_storage: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group A Tier 3 (Multi-Tenant Light Hazard)"
    page: "p.725"
    systems:
      - name: "Automatic Sprinkler System (full coverage)"
