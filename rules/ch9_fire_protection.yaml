      - name: "Fire Water Tank + Foam Reserve"
        spec: "120 minutes water + 15 minutes foam concentrate"

  # Group U - Open yard storage (no building envelope)
  - id: storage_open_yard
    match: {occupancy: storage_industrial, is_open_yard_storage: true}
    section: "Ch 9, #4.11 / Table 9.27 Group U (Open Yard Storage)"
    page: "p.745"
    systems:
      - name: "Portable Fire Extinguishers"
        spec: "Per Chapter 4 - light hazard <2000 m2 OR plant nursery: extinguishers ONLY"
      - name: "Hose Reel System (Open Yard)"
        spec: "Per Section 3.3 - 50 gpm @ 4.5 bar / 30 min tank"
        required: conditional
        detail: "Required when open-yard footprint exceeds 2000 m2 (light hazard) or 1000 m2 (other hazard classes). Outdoor-rated equipment."
      - name: "Yard Fire Hydrants (Open Yard)"
        spec: "Per Section 3.11 - 500 gpm @ 6.9 bar / 60 min tank"
        required: conditional
        detail: "Required for non-flammable open yard storage exceeding 3600 m2."

  # Group V - Plant nursery (Extinguishers only)
  # ============================================================================
  # Table 9.27 Groups F-J - SINGLE-TENANT variants (different pump/tank than A-E)
  # ============================================================================

  # Group F - Single-Tenant Light Hazard
  - id: storage_single_tenant_lh_tier1
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [LH], ground_floor_bua_m2_lt: 900, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group F Tier 1"
    page: "p.729"
    systems:
      - name: "Hose Reel System (single-tenant LH < 900 m2)"
        spec: "Per Section 3.3 - throughout building, NO dry landing valves"
      - name: "Fire Pump (Single-Tenant LH Tier 1)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank"
        spec: "45 minutes duration (single-tenant tier 1 differs from multi-tenant 30 min)"

  - id: storage_single_tenant_lh_tier2
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [LH], ground_floor_bua_m2_gte: 900, ground_floor_bua_m2_lte: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group F Tier 2"
    page: "p.729"
    systems:
      - name: "Automatic Sprinkler System (single-tenant LH 900-3600 m2)"
        spec: "Per Section 3.5; design density 0.10 gpm / 139 m2 (1500 ft2 area of operation) per Table 9.7.F"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant LH Tier 2)"
        spec: "250 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank"
        spec: "60 minutes duration with dedicated direct breeching inlet"

  - id: storage_single_tenant_lh_tier3
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [LH], ground_floor_bua_m2_gt: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group F Tier 3"
    page: "p.729"
    systems:
      - name: "Automatic Sprinkler System"
        spec: "Per Section 3.5; design density 0.10 gpm / 139 m2 per Table 9.7.F"
      - name: "Yard Fire Hydrants (loop)"
        spec: "Per Section 3.11"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant LH Tier 3)"
        spec: "750 gpm @ 6.9 bar at most remote landing/hydrant valve"
      - name: "Fire Water Tank"
        spec: "60 minutes with dedicated direct breeching inlet"

  # Group G - Single-Tenant Ordinary Hazard 1
  - id: storage_single_tenant_oh1_tier1
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH1], ground_floor_bua_m2_lt: 900, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group G Tier 1 (Single-Tenant OH1)"
    page: "p.730"
    # NOTE: Group G page is p.730 (unchanged from prior YAML - happens to be correct).
    systems:
      - name: "Hose Reel System (single-tenant OH1 < 900 m2)"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant OH1 Tier 1)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank"
        spec: "45 minutes duration"

  - id: storage_single_tenant_oh1_tier2
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH1], ground_floor_bua_m2_gte: 900, ground_floor_bua_m2_lte: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group G Tier 2 (Single-Tenant OH1)"
    page: "p.730"
    systems:
      - name: "Automatic Sprinkler System (OH1)"
        spec: "Per Section 3.5; design density 0.15 gpm / 139 m2 per Table 9.7.F"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant OH1 Tier 2)"
        spec: "300 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank"
        spec: "60 minutes with dedicated direct breeching inlet"

  - id: storage_single_tenant_oh1_tier3
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH1], ground_floor_bua_m2_gt: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group G Tier 3 (Single-Tenant OH1)"
    page: "p.730"
    systems:
      - name: "Automatic Sprinkler System"
        spec: "Per Section 3.5; density 0.15 gpm / 139 m2"
      - name: "Yard Fire Hydrants (loop)"
        spec: "Per Section 3.11"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant OH1 Tier 3)"
        spec: "750 gpm @ 6.9 bar at most remote landing valve"
      - name: "Fire Water Tank"
        spec: "60 minutes with dedicated direct breeching inlet"

  # Group H - Single-Tenant Ordinary Hazard 2 (350 gpm @ Tier 2 - distinct from OH1)
  - id: storage_single_tenant_oh2_tier1
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH2], ground_floor_bua_m2_lt: 900, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group H Tier 1 (Single-Tenant OH2)"
    page: "p.731"
    systems:
      - name: "Hose Reel System (single-tenant OH2 < 900 m2)"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant OH2 Tier 1)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank"
        spec: "45 minutes duration"

  - id: storage_single_tenant_oh2_tier2
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH2], ground_floor_bua_m2_gte: 900, ground_floor_bua_m2_lte: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group H Tier 2 (Single-Tenant OH2)"
    page: "p.731"
    systems:
      - name: "Automatic Sprinkler System (OH2 - higher density)"
        spec: "Per Section 3.5; design density 0.20 gpm / 139 m2 per Table 9.7.F (vs 0.15 for OH1)"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant OH2 Tier 2)"
        spec: "350 gpm @ 4.5 bar at most remote hose-reel outlet valve (50 gpm higher than Group G OH1)"
      - name: "Fire Water Tank"
        spec: "60 minutes with dedicated direct breeching inlet"

  - id: storage_single_tenant_oh2_tier3
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH2], ground_floor_bua_m2_gt: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group H Tier 3 (Single-Tenant OH2)"
    page: "p.731"
    systems:
      - name: "Automatic Sprinkler System"
        spec: "Per Section 3.5; density 0.20 gpm / 139 m2"
      - name: "Yard Fire Hydrants (loop)"
        spec: "Per Section 3.11"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Single-Tenant OH2 Tier 3)"
        spec: "750 gpm @ 6.9 bar at most remote landing valve"
      - name: "Fire Water Tank"
        spec: "60 minutes with dedicated direct breeching inlet"

  # Groups I + J - Single-Tenant Extra Hazard (EH1 + EH2 collapsed under HH)
  - id: storage_single_tenant_extra_hazard
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [HH], is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Groups I + J (Single-Tenant Extra Hazard)"
    page: "p.732"
    systems:
      - name: "Automatic Sprinkler System (Extra Hazard)"
        spec: "Per Section 3.5; density 0.30 gpm / 232 m2 (2500 ft2) for EH1 OR 0.40 gpm / 232 m2 for EH2 per Table 9.27 Groups I + J"
        detail: "Where MSDS demands foam sprinklers per Section 3.9, foam-water sprinklers shall be provided throughout. Designer shall determine EH1 vs EH2 from activity (Definition 1.1.13.4 vs 1.1.13.5)."
      - name: "Hose Reel System"
        spec: "Per Section 3.3 (no dry landing valves)"
      - name: "Yard Fire Hydrants (loop)"
        spec: "Per Section 3.11 - required when sum of all GF BUA > 3600 m2"
        required: conditional
      - name: "Fire Pump (Single-Tenant Extra Hazard)"
        spec: "EH1: 750 gpm @ 4.5 bar (<=3600 m2) -> 1250 gpm @ 6.9 bar (>3600 m2). EH2: 1000 gpm @ 4.5 bar (<=3600 m2) -> 1500 gpm @ 6.9 bar (>3600 m2)"
        detail: "Pump duty escalates by both hazard sub-group AND total area."
      - name: "Fire Water Tank"
        spec: "EH1 <=3600 m2: 60 min; EH1 >3600 m2: 90 min; EH2 <=3600 m2: 60 min; EH2 >3600 m2: 120 min. Dedicated direct breeching inlet at all >3600 m2 tiers."
        detail: "EH1 Tier 2 (>3600 m2) tank is 90 min (per Table 9.27 Group I, p.732) - NOT 60 min. EH2 Tier 2 (>3600 m2) tank is 120 min (per Table 9.27 Group J, p.733)."
      - name: "MSDS Review (DESIGNER OBLIGATION)"
        spec: "Per Section 4.11 preamble"

  # Group K - Idle Wood / Plastic Pallet Warehouse
  - id: storage_idle_pallet_warehouse
    match: {occupancy: storage_industrial, is_idle_pallet_storage: true}
    section: "Ch 9, #4.11 / Table 9.27 Group K (Idle Wood / Plastic Pallet Warehouse)"
    page: "p.734"
    systems:
      - name: "Automatic Sprinkler System (commodity-specific design)"
        spec: "Per Section 3.5; density per Table 9.7 sub-tables for idle wooden / plastic pallet storage (typically OH2-equivalent or higher)"
        detail: "Idle wood and plastic pallets are a high-challenge fire load. Design per Tables 9.7.X / 9.7.AA referencing pallet stack height. ESFR design preferred for stacks > 3.7 m."
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Yard Fire Hydrants"
        spec: "Per Section 3.11 - required at facility BUA > 3600 m2"
        required: conditional
      - name: "Fire Pump (Idle Pallet Storage)"
        spec: "Sized to design density - typically 750+ gpm @ 6.9 bar at hydrant outlet at Tier 4"
      - name: "Fire Water Tank"
        spec: "60-90 minutes duration with dedicated direct breeching inlet"
      - name: "MSDS Review (DESIGNER OBLIGATION)"
        spec: "Per Section 4.11 preamble"

  # ============================================================================
  # Section 4.12 / Table 9.28 - TUNNEL FIRE PROTECTION SYSTEMS
  # Two occupancy types (cable vs road/rail) crossed with length tiers.
  # Triggered by has_tunnel + tunnel_kind + tunnel_length_m.
  # ============================================================================
  - id: tunnel_cable_short
    match: {has_tunnel: true, tunnel_kind: cable, tunnel_length_m_lt: 60}
    section: "Ch 9, #4.12 / Table 9.28 Group A (Cable Tunnel < 60 m)"
    page: "p.747"
    systems:
      - name: "Automatic Deluge Water Spray OR Water Mist System"
        spec: "Per Section 3.8 (deluge) OR Section 3.10 (water mist)"
        detail: "Choice of deluge water spray or water mist; both acceptable."
      - name: "Dry Riser at Tunnel Entry Points"
        spec: "Per Section 3.2"
        detail: "Dry riser provided at tunnel entry points only (not throughout)."
      - name: "Hose Reel System at Entry Points"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Cable Tunnel < 60 m)"
        spec: "Sized to satisfy minimum 2 adjacent deluge water spray system zones at 4.5 bar at most remote hose-reel outlet valve. Where water mist provided, pump per manufacturer's specification + Civil Defence approved design."
      - name: "Fire Water Tank"
        spec: "60 minutes operation with low water-level detection and instantaneous refilling"

  - id: tunnel_cable_long
    match: {has_tunnel: true, tunnel_kind: cable, tunnel_length_m_gte: 60}
    section: "Ch 9, #4.12 / Table 9.28 Group A (Cable Tunnel >= 60 m)"
    page: "p.747"
    systems:
      - name: "Automatic Deluge Water Spray OR Water Mist System"
        spec: "Per Section 3.8 OR Section 3.10"
      - name: "Wet Riser System (throughout)"
        spec: "Per Section 3.4"
        detail: "For cable tunnels > 60 m, wet riser is required throughout the tunnel (not just dry-riser at entry points)."
      - name: "Fire Pump (Cable Tunnel >= 60 m)"
        spec: "Sized to satisfy minimum 2 adjacent deluge water spray system zones at 6.9 bar at most remote landing valve. Water mist pump per manufacturer."
      - name: "Fire Water Tank"
        spec: "60 minutes operation with dedicated direct breeching inlet, low water-level detection, instantaneous refilling"

  - id: tunnel_road_rail_medium
    match: {has_tunnel: true, tunnel_kind: road_rail, tunnel_length_m_gte: 90, tunnel_length_m_lte: 1000}
    section: "Ch 9, #4.12 / Table 9.28 Group B (Road/Rail Tunnel 90-1000 m)"
    page: "p.748"
    systems:
      - name: "Wet Riser System (throughout)"
        spec: "Per Section 3.4"
      - name: "Fire Pump (Road/Rail Tunnel 90-1000 m)"
        spec: "750 gpm @ 6.9 bar at most remote landing valve"
      - name: "Fire Water Tank"
        spec: "60 minutes operation with dedicated direct breeching inlet"

  - id: tunnel_road_rail_long
    match: {has_tunnel: true, tunnel_kind: road_rail, tunnel_length_m_gt: 1000}
    section: "Ch 9, #4.12 / Table 9.28 Group B (Road/Rail Tunnel > 1000 m)"
    page: "p.748"
    systems:
      - name: "Automatic Deluge Water Spray OR Water Mist System"
        spec: "Per Section 3.8 OR Section 3.10"
      - name: "Class III Wet Riser System (throughout)"
        spec: "Per Section 3.4 - Class III with 65 mm and 25 mm outlets"
        detail: "Breeching inlets shall be provided at BOTH tunnel openings."
      - name: "Fire Pump (Road/Rail Tunnel > 1000 m)"
        spec: "Sized to satisfy minimum 2 adjacent deluge water spray system zones at 6.9 bar at most remote landing valve. Water mist pump per manufacturer (1 hour duration)."
      - name: "Fire Water Tank"
        spec: "60 minutes operation with low water-level detection and instantaneous refilling"

  - id: tunnel_road_rail_short_none
    match: {has_tunnel: true, tunnel_kind: road_rail, tunnel_length_m_lt: 90}
    section: "Ch 9, #4.12 / Table 9.28 Group B (Road/Rail Tunnel < 90 m)"
    page: "p.748"
    systems:
      - name: "No Tunnel Fire Protection System Required"
        required: not_required
        detail: "Road/rail tunnels less than 90 m do NOT require any fixed fire-protection system per Table 9.28 Group B. Portable extinguishers per Chapter 4 still apply, plus auxiliary-room provisions per Table 9.30."

  - id: storage_plant_nursery
    match: {occupancy: storage_industrial, is_plant_nursery: true}
    section: "Ch 9, #4.11 / Table 9.27 Group V (Plant Nursery)"
    page: "p.746"
    systems:
      - name: "Portable Fire Extinguishers (only)"
        spec: "Per Chapter 4"
        detail: "Plant nurseries (vegetation, garden centres) require extinguishers per Ch 4 only - no fixed water-based fire-protection system."
      - name: "Automatic Sprinkler System"
        required: not_required
      - name: "Hose Reel System"
        required: not_required
      - name: "Fire Pump"
        required: not_required

  - id: parking_enclosed
    match: {occupancy: parking_enclosed}
    section: "Ch 9, #4.8"
    page: "p.718"
    systems:
      - name: "Automatic Sprinkler System (full coverage)"
        detail: "Full sprinkler coverage throughout enclosed car park per Section 3.5."
      - name: "Wet Riser / Dry Riser (height-dependent)"
        requires_wet_riser: true
        detail: "Wet riser required for multi-storey enclosed car park; dry riser allowed for short buildings per Section 3.4/3.2."
      - name: "Standpipe with Class I outlets"
        detail: "Class I landing valves at every floor; 64 mm outlets."
      - name: "Hose Reel (per Section 3.3)"
        detail: "Where required by Section 3.3 travel distances."
      - name: "Fire Pump + Tank"
        spec: "Per associated main-building class (Ch 9, #4.2 - #4.5)"
        detail: "If parking is attached to a mall/highrise/residential tower, pump + tank follow the main-building branch."
      - name: "Smoke Control"
        detail: "Mechanical smoke ventilation/exhaust required per Ch 10 for enclosed parking."

  - id: parking_open
    match: {occupancy: parking_open}
    section: "Ch 9, #4.8"
    page: "p.718"
    systems:
      - name: "Hose Reel System (per Section 3.3)"
        detail: "Hose reels sized to cover all parking bays per Section 3.3 coverage radius."
      - name: "Sprinklers"
        required: conditional
        detail: "Required only where open parking is part of a mall/highrise/super-highrise; standalone open parking does not require sprinklers."

various_locations:
  # NOTE: Exterior balcony sprinklers (Table 9.29.B, p.749) not encoded - user explicitly
  # skipped to avoid UI bloat. The code requires sidewall/pendent sprinklers on exterior
  # balconies of sprinklered buildings (max 12 m2 per head, 79 °C rating). Designers
  # checking balcony coverage should consult Table 9.29.B directly.
  - id: var_atrium
    flag: has_atrium
    systems:
      - name: "Atrium Sprinklers (ceiling + adjacent to opening)"
        required: recommended
        code_ref: "Ch 9, #4.13.1 / Table 9.29.A"
        page_ref: "p.749"
        detail: "Atriums SHOULD be provided with sprinklers at the atrium ceiling and immediately adjacent to every atrium opening (code uses 'should', not 'shall' - Table 9.29.A is the only 'should' entry). Non-combustible draft stops 450 mm deep. See Ch 10 for atrium smoke control."
  - id: var_rain_screen
    flag: has_rain_screen_glazing
    systems:
      - name: "Glazing / Rain-screen Sprinkler Protection"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.C"
        page_ref: "p.749"
        detail: "Window-type pendent sprinklers on ceiling or sidewall sprinklers on walls to cover interior glazing (draft-curtain effect)."
  - id: var_stairs
    flag: has_stairs
    requires_sprinkler_system: true
    systems:
      - name: "Stair Shaft Sprinklers (top + first landing above bottom)"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.D"
        page_ref: "p.749"
        detail: "Sprinkler at top of shaft and at first accessible landing above the bottom of the shaft per Section 3.5. Suppressed automatically when the building's matched FP branch does not require an automatic sprinkler system."
  - id: var_elevator_shaft
    flag: has_elevator
    requires_sprinkler_system: true
    systems:
      - name: "Elevator Pit Sidewall Spray Sprinklers"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.E"
        page_ref: "p.749"
        detail: "Sidewall spray sprinklers at the bottom of each elevator hoistway, not more than 600 mm above the pit floor per Section 3.5. Suppressed automatically when the building's matched FP branch does not require an automatic sprinkler system."
  - id: var_bathroom_heaters
    flag: has_bathrooms_with_heaters
    systems:
      - name: "Bathroom Sprinklers (where electric water-heaters are installed)"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.G"
        page_ref: "p.749"
        detail: "Bathrooms equipped with electric water-heaters shall be sprinklered per Section 3.5 (Table 9.29.G - BATHROOMS). Public washrooms in commercial buildings are also sprinklered; private residential/hotel/apartment guest washrooms WITHOUT heaters are exempt. (NOTE: Table 9.29.F covers the separate 'above false ceiling' provision - that requires sprinklers in concealed combustible-construction spaces and is a different trigger - flag a designer review where both conditions apply.)"
  - id: var_laundry_storage
    flag: has_laundry_storage_rooms
    systems:
      - name: "Laundry / Storage Room Sprinklers"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.H"
        page_ref: "p.749"
        detail: "Residential / apartment / hotel-apartment laundry and storage rooms protected with sprinklers per Section 3.5."
  - id: var_pantries
    flag: has_pantries
    systems:
      - name: "Pantry Sprinklers (business/commercial)"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.I"
        page_ref: "p.749"
        detail: "Pantries in offices and commercial buildings sprinklered per Section 3.5."
  - id: var_stages
    flag: has_permanent_stages
    systems:
      - name: "Stage Sprinklers (under stages, dressing rooms, storerooms, workshops)"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.J"
        page_ref: "p.749"
        detail: "Permanent stages in assembly occupancies protected with sprinklers under the stage, dressing rooms, storerooms and workshops per Section 3.5."
  - id: var_roof_lpg_or_restaurant
    flag: has_roof_lpg_or_restaurant
    systems:
      - name: "Wet Riser extended to roof (with hose reel)"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.K"
        page_ref: "p.750"
        detail: "Building wet riser extended to roofs with LPG tanks, restaurant seating, assembly, or sheesha bars. Hose reels provided at roof level."
  - id: var_garbage_chute
    flag: has_garbage_chute
    systems:
      - name: "Garbage Chute Sprinklers (top + alternating floors + lowest)"
        code_ref: "Ch 9, #4.13.1 / Table 9.29.L"
        page_ref: "p.750"
        detail: "One sprinkler at top of shaft, one at alternating floors, one at lowest level per Section 3.5."

high_ceiling:
  trigger:
    has_high_ceiling_is: true
  code_ref: "Ch 9, #4.13.1 / Table 9.29.A"
  page_ref: "p.750-751"
  note: "Extended-coverage sprinklers, 70 C (160 F), listed for high-ceiling applications. Table values are minimum guidelines - manufacturer's listed design may override."
