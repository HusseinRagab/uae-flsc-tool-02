        detail: "Exterior wet riser along fire access road, every tenant building within 30 m of a hose outlet per Section 3.4. Triggered by open mall plot area 900-2,000 m2."
      - name: "Breeching Inlets (min 2)"
        detail: "Two breeching inlets at separate locations along fire access road."
      - name: "Fire Pump"
        spec: "750 gpm @ 6.9 bar (or 1000 gpm where yard hydrants are included)"
        detail: "Electric/diesel UL/FM listed."
      - name: "Fire Water Tank"
