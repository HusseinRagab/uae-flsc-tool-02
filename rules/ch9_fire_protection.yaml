        spec: "Per Section 4.11 preamble"

  - id: storage_industrial_tier4_lh
    match: {occupancy: storage_industrial, hazard_class_in: [LH], ground_floor_bua_m2_gt: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_single_tenant_storage: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Group A Tier 4 (Multi-Tenant Light Hazard)"
