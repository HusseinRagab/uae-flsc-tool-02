        spec: "Per Section 3.3"
        detail: "Required throughout the building. Tier escalates if any individual unit/compartment area exceeds 230 m2."
      - name: "Dry Landing Valves"
        required: not_required
      - name: "Fire Pump (Tier 1)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet valve"
      - name: "Fire Water Tank (Tier 1)"
        spec: "30 minutes duration"
        detail: "Low water-level detection, instantaneous refilling."
      - name: "MSDS Review (DESIGNER OBLIGATION)"
        spec: "Per Section 4.11 preamble"
        detail: "Designer shall consult relevant Material Safety Data Sheets before finalising sprinkler design. Default light-hazard density (0.15 gpm / 140 m2) may not be sufficient for atypical commodities."

