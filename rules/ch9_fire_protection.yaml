        spec: "Variable per design density; 6.9 bar pressure at hydrant outlet (Tier 3-4) or hose reel (Tier 1-2)"
      - name: "Fire Water Tank + Foam Reserve"
        spec: "120 minutes water + 15 minutes foam concentrate"
        detail: "Significantly longer water duration and foam reserve than Class A commodities."

