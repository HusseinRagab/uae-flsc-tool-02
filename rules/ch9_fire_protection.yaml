  - id: storage_single_tenant_lh_tier2
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [LH], ground_floor_bua_m2_gte: 900, ground_floor_bua_m2_lte: 3600, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
