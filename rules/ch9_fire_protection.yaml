  - id: mall_covered
    match: {occupancy: mall_covered}
    section: "Ch 9, #4.6.1 / Table 9.22.A"
    page: "p.713"
    systems:
      - name: "Automatic Sprinkler System (full coverage incl. basements & podiums)"
        detail: "Full sprinkler coverage throughout the mall including basements, podiums (open + closed) and all tenant spaces per Section 3.5."
      - name: "Wet Riser System (interconnected at highest level)"
        requires_wet_riser: true
        detail: "Wet risers throughout the mall with Class III landing valves per Section 3.4; all risers interconnected at the highest level."
      - name: "Yard Fire Hydrants"
        detail: "Yard hydrant network around mall perimeter per Section 3.11. Not required if infrastructure hydrants are available within 120 m of every exterior part."
      - name: "Tenant Isolation Valves"
        detail: "Every tenant space fitted with an isolation valve so individual tenant areas can be isolated during maintenance without interrupting the rest of the mall."
      - name: "Breeching Inlets (min 2)"
        detail: "Minimum two breeching inlets at two separate locations along the fire access road."
      - name: "ESFR Sprinklers (supermarket / hypermarket / large clothing storage)"
        detail: "Supermarket / hypermarket / large clothing storage areas within the mall protected with ESFR sprinkler system per relevant sections."
      - name: "Fire Pump"
        spec: "Combined (hydrants + internal): 2000 gpm @ 6.9 bar | Internal only: 1500 gpm @ 6.9 bar"
        detail: "Electric or diesel driven UL/FM listed pump set. Fixed mall requirement - not dependent on standpipe count."
      - name: "Fire Water Tank"
        spec: "60 minutes duration"
        detail: "Dedicated direct breeching inlet, low water-level detection, instantaneous utility refill."

  - id: mall_open_small
