      - name: "Fire Pump (Lowrise Single-Exit <=500 m2)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet"
        detail: "Small pump set sized for hose-reel duty only. Fire pump and/or fire water tank permitted on roof if existing structure can bear the additional load."
