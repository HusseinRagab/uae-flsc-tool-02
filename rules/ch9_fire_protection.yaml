# UAE FLSC 2018 - Chapter 9: Fire Protection Systems
meta:
  code: "UAE FLSC 2018 (CDGH-OP-25, September 2018)"
  chapter: 9
  chapter_title: "Fire Protection Systems"

general:
  - id: g_yard_hydrant_nonstorage_plot
    when:
      building_category_not: [storage_industrial]
      plot_area_m2_gt: 20000
    systems:
      - name: "Yard Fire Hydrant System"
        code_ref: "Ch 9, #4.1.4"
        page_ref: "p.694"
        detail: "Yard hydrant loop around plot per Section 3.11. Required because non-storage/non-industrial plot > 20,000 m2 (typically cluster of buildings). Hydrants spaced per code; breeching inlets accessible to Civil Defence."
  - id: g_yard_hydrant_storage_plot
    when:
      building_category_is: storage_industrial
      ground_floor_bua_m2_gt: 3600
    systems:
      - name: "Yard Fire Hydrant System"
        code_ref: "Ch 9, #4.1.6"
        page_ref: "p.694"
        detail: "Yard hydrant loop per Section 3.11. Required because storage/industrial built-up area (BUA) > 3,600 m2 OR ground-floor > 100 m from existing functional hydrant. Trigger keyed off ground-floor BUA per code text 'more than 3600 m2 built-up area' (#4.1.6, p.694) - NOT plot area; a 4,000 m2 BUA warehouse on a small plot must still trigger this rule."
  - id: g_storage_sprinkler_over_3floors
    when:
      building_category_is: storage_industrial
      floors_above_grade_gt: 3
    systems:
      - name: "Automatic Sprinkler System (full coverage)"
        code_ref: "Ch 9, #4.1.7"
        page_ref: "p.694"
        detail: "Full sprinkler coverage throughout the storage/industrial building - trigger is > 3 floors above fire access level, irrespective of BUA. Design density per commodity class per NFPA 13."

branches:
  - id: villa_private_base
    match: {occupancy: villa_private}
    section: "Ch 9, #4.7.1 / Table 9.23.A"
    page: "p.716"
    systems:
      - name: "Automatic Sprinkler System (domestic/residential type)"
        required: recommended
        detail: "Domestic-type sprinklers with domestic water tank are acceptable. Not mandatory but highly recommended throughout private villas irrespective of BUA."

  - id: villa_private_ground_1500
    match: {occupancy: villa_private, ground_floor_bua_m2_gt: 1500}
    section: "Ch 9, #4.7.1 / Table 9.23.A.2"
    page: "p.716"
    systems:
      - name: "Automatic Sprinkler System (full coverage incl. basements & podiums)"
        detail: "Full sprinkler coverage throughout villa including open and closed basements, podiums and all habitable spaces per Section 3.5. Triggered because ground-floor BUA > 1,500 m2."
      - name: "Hose Reel System (basement + ground floor)"
        detail: "Hose reels throughout basement and ground floor per Section 3.3. 30 m coverage radius; 4.5 bar residual pressure at outlet."
      - name: "Fire Pump"
        pump_spec_type: fixed_250
        detail: "Electric-driven fire pump set with jockey pump and controller. UL/FM listed."
      - name: "Fire Water Tank"
        spec: "30 minutes duration"
        detail: "Dedicated fire-water tank with low-level detection and instantaneous refill from utility supply. Two-compartment sectional tank preferred for maintenance continuity."

  - id: villa_private_basement_1500
    match: {occupancy: villa_private, basement_bua_m2_gt: 1500}
    section: "Ch 9, #4.7.1 / Table 9.23.A.3"
    page: "p.716"
    systems:
      - name: "Automatic Sprinkler System (basements)"
        detail: "Sprinkler coverage throughout basements (open and closed) per Section 3.5. Triggered because basement BUA > 1,500 m2."
      - name: "Hose Reel System (basement + ground floor)"
        detail: "Hose reels throughout basement and ground floor per Section 3.3."
      - name: "Fire Pump"
        pump_spec_type: fixed_250
        detail: "Electric-driven pump set UL/FM listed."
      - name: "Fire Water Tank"
        spec: "30 minutes duration"
        detail: "Low water-level detection + instantaneous utility refill."

