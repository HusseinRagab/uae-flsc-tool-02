      - name: "Fire Pump"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet"
        detail: "Small pump set sized for hose-reel duty only."
      - name: "Fire Water Tank"
        spec: "30 minutes duration"
        detail: "Low-level detection + instantaneous utility refill."

  - id: mall_open_mid
