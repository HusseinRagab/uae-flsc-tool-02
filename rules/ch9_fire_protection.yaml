    # (midrise_detention, Table 9.20.d). Without this exclusion a 15-23 m
    # detention building matched BOTH and produced duplicate Fire Pump lines.
    match: {height_m_gt: 15, height_m_lt: 23, occupancy_group_is: midrise_public,
            occupancy_not: [detention_a, detention_b, detention_c],
            plot_area_m2_lt: 20000}
    section: "Ch 9, #4.4.1 / Table 9.20.a (plot < 20,000 m2)"
    page: "p.700"
    systems:
      - name: "Automatic Sprinkler System (full coverage)"
        detail: "Full sprinkler coverage throughout midrise per Section 3.5."
      - name: "Wet Riser System (interconnected at highest level)"
        requires_wet_riser: true
        detail: "Wet risers throughout per Section 3.4."
      - name: "Fire Pump"
        pump_spec_type: standpipe_dependent
        detail: "750 gpm for 2 standpipes, 1000 gpm for more than 2; 6.9 bar."
      - name: "Fire Water Tank"
        spec: "45 minutes duration"
        detail: "Dedicated breeching inlet + instantaneous refill."

