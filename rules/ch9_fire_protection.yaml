      - name: "MSDS Review (DESIGNER OBLIGATION)"
        spec: "Per Section 4.11 preamble"
        detail: "Mandatory for all HH commodities."

  # ---- Specialty groups (overlay; flag-driven) ------------------------------
  # Group P - Cold storage (code-literal "BELOW 40C TEMPERATURES") - dry-pipe sprinklers
  # NOTE: The code text on p.739 literally reads "STORAGE FACILITIES WITH BELOW 40C
  # TEMPERATURES" - this is the code's wording, copied verbatim. Engineering interpretation:
  # most likely intended is "+4 °C and below" (true cold storage / chillers / freezers,
  # where wet sprinklers risk freezing). 40 °C as written is incoherent (40 °C is hot,
  # not cold). Designer should treat this as ANY refrigerated facility (chillers 0-10 °C,
  # freezers below 0 °C) per typical industry practice and ASHRAE refrigeration guides.
  - id: storage_cold_storage
    match: {occupancy: storage_industrial, is_cold_storage: true}
    section: "Ch 9, #4.11 / Table 9.27 Group P (Cold Storage)"
    page: "p.739"
    systems:
      - name: "Automatic DRY-Pipe Sprinkler System (NOT wet pipe)"
        spec: "Per Section 3.6 - dry-pipe sprinklers throughout cold-storage area (code text: 'BELOW 40C')"
        detail: "Wet sprinklers would freeze; dry-pipe is mandatory for cold-storage facilities. Density per Tables 9.7.H / 9.7.I / 9.8.A / 9.7.Z.a / 9.7.Z.b / 9.7.AA.a-c (commodity-specific). CODE-LITERAL TEMPERATURE: 'BELOW 40C' as printed on p.739 - engineering interpretation: any refrigerated facility (typically +4 °C chillers and below, or freezers below 0 °C). Verify with Civil Defence for the specific room conditions."
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Water Tank (Cold Storage)"
        spec: "30 min (<230 m2) / 45 min (230-900 m2) / 60 min (900-3600 m2 and >3600 m2)"
        detail: "Tier-based per Table 9.27 Group P. Tier 3-4 require dedicated direct breeching inlet for refilling."

