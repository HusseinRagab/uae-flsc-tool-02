  # ---- High Hazard tier (Groups L-O - plastics/rubber/tires/paper, Class I-IV) -----
  - id: storage_industrial_tier_hh
    match: {occupancy: storage_industrial, hazard_class_in: [HH], is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_single_tenant_storage: false, is_idle_pallet_storage: false}
    section: "Ch 9, #4.11 / Table 9.27 Groups L-O (High Hazard, Class I-IV / plastics / rubber / tires / paper)"
    page: "p.730"
    systems:
      - name: "Automatic Sprinkler System (commodity-specific design)"
        spec: "Per Section 3.5; design density per Tables 9.7.M / 9.7.X / 9.7.DD / 9.7.EE / 9.7.GG (commodity- and storage-height-dependent)"
        detail: "DENSITY DEPENDS ON COMMODITY AND STORAGE CONFIGURATION. Designer shall consult Table 9.7 sub-tables for the specific commodity (Class I-IV, plastic/rubber, tires, rolled paper). In-rack sprinklers per Table 9.7.KK may be required for high-piled / advanced storage. ESFR design permitted where applicable."
      - name: "Yard Fire Hydrants (loop)"
        spec: "Per Section 3.11"
        required: conditional
        detail: "Required at Tier 4 (>3600 m2). Below that tier, follow OH thresholds."
      - name: "Hose Reel System (throughout)"
        spec: "Per Section 3.3"
      - name: "Fire Pump (HH)"
        spec: "Sized to design density - typically 750+ gpm @ 6.9 bar at hydrant outlet for Tier 4"
        detail: "Pump duty scales with sprinkler design density per Tables 9.7.M-GG. NOT a fixed value."
      - name: "Fire Water Tank (HH)"
        spec: "60-90 minutes duration"
        detail: "30 min Tier 1; 60 min Tier 2-3; 90 min Tier 4 / commodities with elevated demand. Dedicated direct breeching inlet at Tier 3+."
      - name: "MSDS Review (DESIGNER OBLIGATION)"
        spec: "Per Section 4.11 preamble"
        detail: "Mandatory for all HH commodities."

  # ---- Specialty groups (overlay; flag-driven) ------------------------------
  # Group P - Cold storage (< 40 deg C) - dry-pipe sprinklers
  - id: storage_cold_storage
    match: {occupancy: storage_industrial, is_cold_storage: true}
    section: "Ch 9, #4.11 / Table 9.27 Group P (Cold Storage)"
    page: "p.730"
    systems:
      - name: "Automatic DRY-Pipe Sprinkler System (NOT wet pipe)"
        spec: "Per Section 3.6 - dry-pipe sprinklers throughout cold-storage area below 40 deg C"
        detail: "Wet sprinklers would freeze; dry-pipe is mandatory for cold-storage facilities operating below 40 deg C. Density per Tables 9.7.H / 9.7.I / 9.8.A / 9.7.Z.a / 9.7.Z.b / 9.7.AA.a-c (commodity-specific)."
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Water Tank (Cold Storage)"
        spec: "60-90 minutes duration"

  # Group Q - Aircraft hanger
  - id: storage_aircraft_hanger
    match: {occupancy: storage_industrial, is_aircraft_hanger: true}
    section: "Ch 9, #4.11 / Table 9.27 Group Q (Aircraft Hanger)"
    page: "p.730"
    systems:
      - name: "Foam-Water Deluge System"
        spec: "Per Section 3.9 / Table 9.11; foam discharge density min 0.16 gpm/ft2 (Group I); area per deluge system <= 1394 m2 (15,000 ft2); max 3.7 m between devices"
        detail: "Group I (door height > 8.5 m AND fire area > 3716 m2): foam-water deluge mandatory. Groups II-III (fueled aircraft): supplementary systems under wings per NFPA 409, spray density 0.17 gpm/ft2. Group IV (unfueled, membrane-covered): standard sprinklers 0.17 gpm / 465 m2 area."
      - name: "Yard Fire Hydrants"
        spec: "Per Section 3.11"
      - name: "Hose Reel System"
        spec: "Per Section 3.3"
      - name: "Fire Pump (Aircraft Hanger)"
        spec: "1500 gpm @ 6.9 bar at most remote hydrant outlet valve"
      - name: "Fire Water Tank + Foam Concentrate"
        spec: "60 minutes water + 10 minutes foam concentrate"
        detail: "Foam concentrate sized for 10 minutes of full-design discharge; AFFF 3 percent or fluorine-free per Civil Defence approval."

  # Group R - Flammable / combustible liquid WAREHOUSE
  - id: storage_flammable_liquid_warehouse
    match: {occupancy: storage_industrial, is_flammable_liquid_warehouse: true}
    section: "Ch 9, #4.11 / Table 9.27 Group R (Flammable / Combustible Liquid Warehouse)"
    page: "p.730"
    systems:
      - name: "Sprinkler OR Foam-Water Sprinkler System"
        spec: "Per Section 3.5 (sprinklers) OR Section 3.9 / Table 9.11 (foam) - in-rack per Table 9.7.KK for advanced storage"
        detail: "Choice of standard sprinklers or foam-water sprinklers depending on flash point, container size, and storage arrangement. In-rack sprinklers MANDATORY for high-piled / racked flammable-liquid storage per Table 9.7.KK."
