      - name: "Fire Water Tank"
        spec: "60 minutes with dedicated direct breeching inlet"

  # Group G - Single-Tenant Ordinary Hazard 1
  - id: storage_single_tenant_oh1_tier1
    match: {occupancy: storage_industrial, is_single_tenant_storage: true, hazard_class_in: [OH1], ground_floor_bua_m2_lt: 900, is_aircraft_hanger: false, is_cold_storage: false, is_flammable_liquid_warehouse: false, is_flammable_liquid_industrial: false, is_open_yard_storage: false, is_plant_nursery: false, is_idle_pallet_storage: false}
