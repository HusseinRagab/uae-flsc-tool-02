      - name: "Fire Water Tank"
        spec: "60 minutes duration"

  - id: superhighrise_large_plot
    match: {height_m_gt: 90, plot_area_m2_gt: 20000, occupancy_not: [villa_private, villa_commercial, mall_covered, mall_open, mall_mixed]}
