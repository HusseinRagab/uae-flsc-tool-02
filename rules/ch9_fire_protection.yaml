        requires_wet_riser: true
        detail: "Zoned wet-riser system with High and Low pressure zones per Table 9.6.13. Every standpipe Class III with 38 mm hose-reel outlet and 64 mm landing valve."
      - name: "Wet Risers Interconnected at Lowest + Highest Level of Each Zone"
        detail: "Cross-connections at lowest and highest floor of each pressure zone to allow pump redundancy and pressure equalisation."
      - name: "Multi-level Pump Set (every 90 m from lowest level)"
        detail: "Vertically staged pump rooms every 90 m of building height per Table 9.6.13."
      - name: "Yard Fire Hydrants"
        detail: "Yard hydrant loop around perimeter per Section 3.11."
      - name: "Fire Pump (first/lowest level)"
        spec: "Combined (yard + internal): 1000 gpm @ 17 bar | Intermediate pumps every 90 m per Table 9.6.13"
        detail: "UL/FM listed pump set sized for base-of-building duty; intermediate zone pumps supplement with boosted pressure."
      - name: "Fire Water Tank"
        spec: "60 minutes duration"
        detail: "Dedicated direct breeching inlet, low water-level detection, instantaneous utility refill."

