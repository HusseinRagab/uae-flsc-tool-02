  # ---------------- LOWRISE TENTS / MARQUEES / SITE OFFICES (Ch 9, #4.5.6 / Table 9.21.f) ----
  # Six sub-tiers depending on tent_marquee_kind:
  #   temporary           -> extinguishers only
  #   permanent           -> hose reel + 50 gpm @ 4.5 bar / 30 min tank
  #   commercial_desert   -> hose reel + 50 gpm @ 4.5 bar / 30 min tank
  #   site_office_short   -> extinguishers only (used <6 months)
  #   site_office_long    -> hose reel + 50 gpm @ 4.5 bar / 30 min tank (used >6 months)
  #   small_detached      -> extinguishers only (detached G+1 <=150 m2 any occupancy)
  - id: lowrise_tent_marquee_extinguishers_only
    match:
      tent_marquee_kind_in: [temporary, site_office_short, small_detached]
    section: "Ch 9, #4.5.6 / Table 9.21.f (sub-rows A / D / F)"
    page: "p.712"
    systems:
      - name: "Portable Fire Extinguishers (only)"
        spec: "Per Chapter 4"
        detail: "Temporary tents/marquees, short-duration site offices (<6 months), and detached G+1 buildings with GF BUA <= 150 m2 (any occupancy) require extinguishers per Chapter 4 only - no fixed water-based system."
      - name: "Automatic Sprinkler System"
        required: not_required
      - name: "Hose Reel System"
        required: not_required
      - name: "Fire Pump"
        required: not_required
      - name: "Fire Water Tank"
        required: not_required

  - id: lowrise_tent_marquee_hose_reel
    match:
      tent_marquee_kind_in: [permanent, commercial_desert, site_office_long]
    section: "Ch 9, #4.5.6 / Table 9.21.f (sub-rows B / C / E)"
    page: "p.712"
    systems:
      - name: "Hose Reel System (throughout)"
        detail: "Hose reels throughout per Section 3.3. Permanent tents/marquees, permanent commercial tents and desert camps, and long-duration site offices (>6 months) require a hose-reel system."
      - name: "Dry Landing Valves"
        required: not_required
        detail: "Not required."
      - name: "Fire Pump (Tents / Marquees / Long-Duration Site Office)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet"
        detail: "Pump sized for hose-reel duty only."
      - name: "Fire Water Tank"
        spec: "30 minutes duration"
        detail: "Low-level detection, instantaneous refill."

  # ---------------- MOTOR FUEL DISPENSING (#4.9 / Table 9.25) --------------
  # ---------- Table 9.25 - Motor Fuel Dispensing - 3 sub-groups (A / B / C) ----------
  # Code text Table 9.25:
  #   A = petrol/gas station + mini marts / restaurants / dining / retail / business /
  #       service-or-repair as INDIVIDUAL BUILDINGS -> sprinklers + hose reel +
  #       300 gpm @ 4.5 bar pump + 60 min tank
  #   B = petrol/gas station + restaurants/bakeries WITHIN a single mini-mart, OR
  #       service/repair, fleet, marine -> hose reel only + 50 gpm @ 6.9 bar pump +
  #       60 min tank (no sprinklers)
  #   C = petrol/gas station + mini-mart ONLY (no service/repair) OR electric charging
  #       units -> extinguishers per Ch 4 Table 4.3.2.8 (NO water-based system)
  - id: motor_fuel_dispensing_group_a
    match: {occupancy: motor_fuel_dispensing, motor_fuel_group_is: A}
    section: "Ch 9, #4.9.1 / Table 9.25 Group A"
    page: "p.722"
    systems:
      - name: "Automatic Sprinkler System (Group A - service station with individual buildings)"
        spec: "Per Section 3.5 - throughout mini marts, restaurants, dining areas, business, retail, service stations"
        detail: "Group A applies when mini-marts / restaurants / dining / retail / business / service-or-repair stations exist as INDIVIDUAL BUILDINGS on the petrol/gas station plot."
      - name: "Hose Reel System (throughout)"
        spec: "Per Section 3.3"
        detail: "Required throughout the building including all customer-accessible areas."
      - name: "Dry Landing Valves"
        required: not_required
        detail: "Not required - hose reel system covers manual firefighting needs."
      - name: "Fire Pump (Group A)"
        spec: "300 gpm @ pressure to satisfy 4.5 bar at most remote hose-reel outlet valve"
        detail: "Group A pump duty (full-service station with separate buildings)."
      - name: "Fire Water Tank"
        spec: "60 minutes duration"
        detail: "Dedicated direct breeching inlet, low water-level detection, instantaneous refilling arrangement."
      - name: "Underground Fuel Storage Tank Protection (cross-reference Ch 9 #4.15 / Ch 13)"
        detail: "Underground fuel storage tanks: vapour-recovery, leak-detection, overfill prevention, vent piping, transfer-point safeguards per Chapter 13 Flammable Liquids. Aboveground LPG tanks (if any) per Ch 11."

  - id: motor_fuel_dispensing_group_b
    match: {occupancy: motor_fuel_dispensing, motor_fuel_group_is: B}
    section: "Ch 9, #4.9.1 / Table 9.25 Group B"
    page: "p.722"
    systems:
      - name: "Automatic Sprinkler System"
        required: not_required
        detail: "Group B does NOT require automatic sprinklers (single mini-mart building / fleet / marine). Sprinklers ARE required for Group A only."
      - name: "Hose Reel System (throughout)"
        spec: "Per Section 3.3"
        detail: "Required throughout the building."
      - name: "Dry Landing Valves"
        required: not_required
        detail: "Not required - hose reel system covers manual firefighting needs."
      - name: "Fire Pump (Group B)"
        spec: "50 gpm @ pressure to satisfy 6.9 bar at most remote hydrant outlet valve"
        detail: "Group B pump duty: lower flow (50 gpm) but higher pressure (6.9 bar) at the most remote hydrant outlet (NOTE the difference vs Group A: 6.9 bar / hydrant, not 4.5 bar / hose-reel). Applies to petrol stations with restaurants/bakeries WITHIN a single mini-mart, plus service/repair, fleet vehicle, and marine motor-fuel dispensing."
      - name: "Fire Water Tank"
        spec: "60 minutes duration"
        detail: "Low water-level detection, instantaneous refilling arrangement."
      - name: "Underground Fuel Storage Tank Protection (cross-reference Ch 9 #4.15 / Ch 13)"
        detail: "Underground fuel storage tanks: vapour-recovery, leak-detection, overfill prevention, vent piping, transfer-point safeguards per Chapter 13 Flammable Liquids."

  - id: motor_fuel_dispensing_group_c
    match: {occupancy: motor_fuel_dispensing, motor_fuel_group_is: C}
    section: "Ch 9, #4.9.1 / Table 9.25 Group C"
    page: "p.722"
    systems:
      - name: "Portable Fire Extinguishers (only)"
        spec: "Per Chapter 4, Table 4.3.2.8"
        detail: "Group C (petrol/gas station with mini-mart ONLY without service/repair, OR electric vehicle charging units) requires NO water-based fire-protection system. Extinguishers per Chapter 4 are the sole requirement. Verify Class B / Class C extinguisher coverage per FE chapter."
      - name: "Automatic Sprinkler System"
        required: not_required
        detail: "NOT required for Group C."
      - name: "Hose Reel System"
        required: not_required
        detail: "NOT required for Group C."
      - name: "Fire Pump"
        required: not_required
        detail: "NOT required for Group C."
      - name: "Fire Water Tank"
        required: not_required
        detail: "NOT required for Group C."
      - name: "Underground Fuel Storage Tank Protection (cross-reference Ch 9 #4.15 / Ch 13)"
        detail: "Underground fuel storage tanks still require vapour-recovery / leak-detection / overfill prevention per Ch 13 even though no water-based fire-protection system is mandated."

  # ============================================================================
  # Section 4.10 / Table 9.26 - INFRASTRUCTURE FIRE PROTECTION SYSTEMS
  # Applies to: new developments, marina/waterfront, theme/amusement parks,
  # commercial developments. Yard-hydrant network only (no in-building systems).
  # ============================================================================
  - id: infrastructure_general
    match: {occupancy: infrastructure}
    section: "Ch 9, #4.10 / Table 9.26"
    page: "p.723"
    systems:
      - name: "Yard Fire Hydrants - Dedicated Network (NOT shared with irrigation)"
        spec: "Per Section 3.11 - dedicated loop along fire-access road; intervals per Table 3.13"
        detail: "Combined network with irrigation is NOT acceptable. Dedicated corridor / trench with strategic accessible manholes shall be provided for the hydrant piping. Fire pump room and fire water tank to be located in service blocks or facility-management areas."
      - name: "Fire Pump (Infrastructure)"
        pump_spec_type: fixed_1000
        spec: "1000 gpm @ 6.9 bar at most remote hydrant outlet valve"
        detail: "Stand-alone dedicated fire pump set serving ONLY the yard-hydrant network."
      - name: "Fire Water Tank (Infrastructure)"
        spec: "90 minutes capacity at full pump duty"
        detail: "Low water-level detection, dedicated direct breeching inlet, instantaneous refilling. TSE (treated sewage water) acceptable subject to testing; sweet water from lakes/ponds acceptable with adequate reserve."
      - name: "Marina / Waterfront - Cross-reference Chapter 21"
        required: conditional
        detail: "Marinas and waterfront infrastructure shall additionally comply with Chapter 21 / Table 21.4 (Marine fire-protection systems)."

  # ============================================================================
  # Section 4.11 / Table 9.27 - STORAGE / WAREHOUSE / INDUSTRIAL
  # Tier breakpoints per code: total GF BUA < 900 / >900 (or unit 230-900) /
