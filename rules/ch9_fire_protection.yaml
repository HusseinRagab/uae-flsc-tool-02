  # ---- Midrise single-exit small footprint (Table 9.20.c, #4.4.3) ----
  # Residential/Business/Animal Housing midrise (15-23 m) with single exit stair
  # AND ground-floor BUA <= 500 m2. Fixed 500 gpm @ 6.9 bar / 45 min tank.
  - id: midrise_single_exit_small
    match:
      height_m_gt: 15
      height_m_lt: 23
      occupancy_in: [residential, labour_accommodation, staff_accommodation, hostel, business, animal_housing]
      ground_floor_bua_m2_lte: 500
      has_single_exit_stair_is: true
    section: "Ch 9, #4.4.3 / Table 9.20.c"
    page: "p.703"
    systems:
      - name: "Automatic Sprinkler System (full coverage incl. basements & podiums)"
        detail: "Full sprinkler coverage throughout the building including basements and podiums (open and closed) per Section 3.5. Triggered because midrise single-exit-stair building has GF BUA <= 500 m2."
      - name: "Wet Riser System (interconnected at highest level)"
        requires_wet_riser: true
        detail: "Wet risers throughout per Section 3.4; interconnected at the highest level."
      - name: "Fire Pump (Midrise Single-Exit)"
        spec: "500 gpm @ 6.9 bar at most remote landing valve"
        detail: "Fixed 500 gpm duty per Table 9.20.c - independent of number of standpipes."
      - name: "Fire Water Tank"
        spec: "45 minutes duration"
        detail: "Low-level detection, dedicated direct breeching inlet, instantaneous utility refill."

  # ---- Midrise Detention (Table 9.20.d, #4.4.4) - SAFETY CRITICAL ----
  # Detention midrise: pre-action sprinklers in cells/inmate areas (NFPA Section 3.7)
  # PLUS standard wet-pipe sprinklers in non-cell areas. Unique system type.
  - id: midrise_detention
    match:
      height_m_gt: 15
      height_m_lt: 23
      occupancy_in: [detention_a, detention_b, detention_c]
    section: "Ch 9, #4.4.4 / Table 9.20.d"
    page: "p.704"
    systems:
      - name: "Pre-action Sprinkler System (CELLS + INMATE AREAS)"
        spec: "Pre-action sprinklers per Section 3.7 throughout all cells and inmate-accessible areas"
        detail: "DETENTION-SPECIFIC: cells and inmate areas use pre-action sprinklers (not wet-pipe) to prevent accidental discharge and tampering, and to allow staff verification before water release. Heads in inmate areas shall be institutional/tamper-resistant per NFPA 13."
      - name: "Automatic Sprinkler System (NON-CELL AREAS incl. basements & podiums)"
        detail: "All areas other than cells/inmate areas (admin, kitchen, laundry, plant rooms, basements, podiums - open and closed) protected with standard wet-pipe sprinklers per Section 3.5."
      - name: "Wet Riser System (interconnected at highest level)"
        requires_wet_riser: true
        detail: "Wet risers throughout per Section 3.4; interconnected at the highest level."
      - name: "Yard Fire Hydrants"
        detail: "Yard hydrant loop per Section 3.11. NOT required where infrastructure yard hydrants are available within 60 m of the towers; tapping into the existing infrastructure network is permitted to achieve coverage."
      - name: "Fire Pump (Detention Midrise - combined yard + internal)"
        spec: "Combined (yard + internal): 1000 gpm @ 6.9 bar at most remote landing valve and hydrant (irrespective of number of standpipes); OR internal-only: 750 gpm (2 standpipes) / 1000 gpm (more than 2 standpipes) @ 6.9 bar"
        detail: "Where the fire pump is combined (serves both yard hydrants and internal systems) the duty is fixed at 1000 gpm. Where it serves only internal building systems, the duty follows the standpipe-dependent bracket."
      - name: "Fire Water Tank (Detention Midrise)"
        spec: "60 minutes duration"
        detail: "Combined yard + internal: dedicated direct breeching inlet, low-level detection, instantaneous utility refill. Internal-only configuration also 60 min."

  - id: lowrise_public_upto_500
    match: {height_m_lte: 15, occupancy_group_is: lowrise_public, ground_floor_bua_m2_lte: 500}
