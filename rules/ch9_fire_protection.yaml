  # ---------------- LOWRISE VILLA CONVERTED TO COMMERCIAL (Ch 9, #4.5.4 / Table 9.21.d) ----
  # Existing G+1 villas converted to nurseries, clinics, daycare, restaurants, showrooms,
  # boutiques. <900 m2 = extinguishers only. >900 m2 with 2 stairs = extinguishers only.
  # >900 m2 with only 1 stair = highly recommended: add external 2nd stair OR
  # sprinklers + hose reel (with 250 gpm @ 4.5 bar / 30 min tank).
  - id: lowrise_villa_converted
    match:
      height_m_lte: 15
      villa_converted_use_is: true
    section: "Ch 9, #4.5.4 / Table 9.21.d"
    page: "p.710"
    systems:
      - name: "Portable Fire Extinguishers (Chapter 4)"
        detail: "Extinguishers per Chapter 4 are the baseline requirement for all converted villa tiers. (Tier 1: <900 m2 irrespective of stairs. Tier 2: >900 m2 with 2 exit stairs. Tier 3: >900 m2 with only 1 exit stair.)"
      - name: "Second Exit Stair (HIGHLY RECOMMENDED for >900 m2 single-stair villas)"
        required: recommended
        detail: "Where GF BUA > 900 m2 AND only one exit stair is available: it is HIGHLY RECOMMENDED that the owner consider providing a second exit stair externally from the first floor."
      - name: "Automatic Sprinkler System (full coverage incl. basements) - HIGHLY RECOMMENDED for >900 m2 single-stair villas"
        required: recommended
        detail: "Alternative to adding a second exit stair: provide automatic sprinklers throughout the building (including basements) per Section 3.5. Applies only where GF BUA > 900 m2 AND only one exit stair is available."
      - name: "Hose Reel System (HIGHLY RECOMMENDED for >900 m2 single-stair villas if sprinklers added)"
        required: recommended
        detail: "Where sprinklers are added per the recommendation above, also provide hose reels per Section 3.3."
      - name: "Fire Pump (if sprinklers are added per recommendation)"
        required: conditional
        spec: "250 gpm @ 4.5 bar at most remote hose-reel outlet"
        detail: "Required only where the recommended sprinkler + hose-reel option is adopted for a >900 m2 single-stair converted villa. Fire pump and/or fire water tank permitted on roof if existing structure can bear the additional load."
      - name: "Fire Water Tank (if sprinklers are added per recommendation)"
        required: conditional
        spec: "30 minutes duration"
        detail: "Low-level detection, instantaneous utility refill."

  # ---------------- LOWRISE COMMERCIAL OUTLET ATTACHED (Ch 9, #4.5.5 / Table 9.21.e) ----
  # Villas / business / mosques with commercial / mercantile outlets attached or in the
