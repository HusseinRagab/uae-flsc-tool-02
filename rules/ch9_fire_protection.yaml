      band_13_5_18: {height_range: "13.5 m to 18 m", k_factor: "K11.2 (K160)", min_pressure: "18 psi (1.2 bar)", min_sprinklers: 4, density: "0.20 gpm/ft2 (8.0 mm/min)", design_area: "2500 ft2 (230 m2)", pump_without_hydrant_gpm: 750, pump_with_hydrant_gpm: 1000}
      band_18_30: {height_range: "18 m to 30 m", k_factor: "K25.2 (K360)", min_pressure: "7 psi (0.5 bar)", min_sprinklers: 12, pump_without_hydrant_gpm: 1000, pump_with_hydrant_gpm: 1250}
