      - name: "Fire Pump (Commercial Outlet Attached <=900 m2)"
        spec: "50 gpm @ 4.5 bar at most remote hose-reel outlet"
        detail: "Pump sized for hose-reel duty only. Fire pump and/or fire water tank permitted on roof if structure can bear additional load."
      - name: "Fire Water Tank"
        spec: "30 minutes duration"
        detail: "Low-level detection, dedicated direct breeching inlet, instantaneous utility refill."

  - id: lowrise_commercial_outlet_attached_large
    match:
