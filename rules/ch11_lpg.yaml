# UAE FLSC 2018 - Chapter 11: Liquefied Petroleum Gas (LPG) Code of Practice
meta:
  code: "UAE FLSC 2018 (CDGH-OP-25, September 2018)"
  chapter: 11
  chapter_title: "Liquefied Petroleum Gas (LPG)"

# ---------- BRANCHES: by gas-system type --------------------------------
# ----- Universal LPG Code requirements (apply when ANY gas system present) -----
general:
  - id: lpg_general_civil_defence_listing
    when: {}
    systems:
      - name: "Civil Defence Listing + Approved Contractor (Universal)"
        code_ref: "Ch 11, #6 / Material Test Standards"
        page_ref: "p.932"
        spec: "All LPG components (tanks, cylinders, regulators, valves, detectors, piping, ESVs) Civil Defence approved and listed"
        detail: "Installation only by Civil Defence approved and licensed LPG contractor. General contractors / MEP / electrical / plumbing contractors NOT permitted to install LPG systems. Composite cylinders REQUIRED (shall be composite type only) for food trucks per Table 11.3 #3.iii (p.899). ASME-listed tanks for above-ground / mounded. Cathodic protection mandatory for underground steel tanks."

  - id: lpg_general_gas_detection_universal
    when: {}
    systems:
      - name: "Gas-Leak Detection + Interfaced ESV (Universal)"
        code_ref: "Ch 11, #2.1.5 + 2.2.5 / Tables 11.1, 11.2, 11.4 #7"
        page_ref: "p.903"
        spec: "Approved listed LPG leak detector mounted not more than 30 cm above finished floor and within 5 m of LPG source. LEL set-points: low alarm at 15% LEL, high alarm at 30% LEL, main supply auto-shutoff at 30% LEL (Table 11.4 #7, p.903)."
        detail: "LPG detector control panel interfaced with main fire alarm panel via local alarm relay. On detection: automatic emergency shut-off valve (ESV) at meter / cylinder bank closes; remote ESV accessible at building exit / outside enclosure. LEL thresholds (Table 11.4 #7, p.903): 15% LEL triggers LOW alarm; 30% LEL triggers HIGH alarm and automatic shutoff of the main LPG supply via the interfaced ESV. For LARGE installations Stage 1 (central detection at knockout pot / PRDP) AND Stage 2 (per-kitchen / per-apartment detection) required. Detectors approved per Civil Defence."

  - id: lpg_general_ignition_clearance
    when: {}
    systems:
      - name: "Ignition-Source Clearance + Electrical Hazard Class"
        code_ref: "Ch 11, #2.1.7 / Table 11.1 #7 (outdoor ignition), Table 11.2 #2.i (indoor exit-route clearance)"
        page_ref: "p.895 (outdoor) / p.896 (indoor)"
        spec: "Outdoor cylinders: NO ignition source within 3 m (Table 11.1 #7, p.895). Indoor cylinder compartment: 1.5 m clearance to fire-exit routes / exit doors / exit stairs / windows & openings (Table 11.2 #2.i, p.896) — this 1.5 m is an EXIT-ROUTE clearance, NOT an ignition-source clearance; the indoor ignition-source / cooking-appliance separation is 3 m (see next item). Fixed electrical equipment near the installation: explosion-proof / hazard-class rated."
        detail: "All electrical connections and appliances near an LPG installation shall be NFPA 70 Class I Division 1 or 2 rated as appropriate. Cooking appliances NOT to be used with CNG fuel unless certified for it. Cylinder enclosures locked against tampering. Steel barricades where near vehicle paths (parking lots / ramps / roads). NOTE: the 1.5 m indoor figure is the Table 11.2 #2.i separation from exit routes / doors / stairs / windows — do not confuse it with the 3 m indoor ignition-source / cooking-appliance separation in the next item."
      - name: "Indoor Cylinder Compartment - 3 m Clearance to Cooking Appliance"
        code_ref: "Ch 11, #2.2 / Table 11.2 #2.ii"
        page_ref: "p.896"
        spec: "Minimum 3 m horizontal distance between the indoor LPG cylinder compartment edge and any ignition source / cooking appliance (Table 11.2 item 2.ii, p.896)."
        detail: "Separate from the general 1.5 m ignition-source clearance: the indoor compartment edge itself must be at least 3 m from the nearest cooking appliance or other ignition source. This applies in ADDITION to the 1.5 m fixed-electrical-equipment hazard-class rule. Where the kitchen is the served space, the cylinder compartment shall be located outside / external where feasible; if indoor placement is unavoidable, the 3 m compartment-edge-to-cooking-appliance separation is mandatory."

  - id: lpg_general_inspection_maintenance
    when: {}
    systems:
      - name: "Inspection + Maintenance Checklist (Table 11.14)"
        code_ref: "Ch 11, #5 / Table 11.14"
        page_ref: "p.930-931"
        spec: "Quarterly inspection mandatory; shut-off valves + gauges + PRVs replaced every 10 years (Table 11.14 #2 items 2.i + 2.ii, p.930)"
        detail: "Quarterly visual inspection of: tank / cylinder, shut-off valves, gauges, pressure regulator, filling point, piping + joints, gas-detection panel + sensors, ventilation. Shut-off valves and gauges shall be REPLACED every 10 years (or sooner if damage evident). Pressure-Relief Valves (PRVs) shall ALSO be REPLACED every 10 years per Table 11.14 #2 item 2.ii (p.930). Pressure regulators locked against unauthorized adjustment. First-stage regulator located as close as practicable to the storage vessel. LPG detector LED blinking verified. Control panel power continuity verified. Records retained at facility."

branches:
  # ----- Aboveground LPG Tank (has_lpg_tanks flag) -----
  - id: lpg_aboveground_tank
    match: {has_lpg_tanks_is: true}
    section: "Ch 11, #2.5.3 / Table 11.5 + Tables 11.6.a-d"
    page: "p.905-907"
    systems:
      - name: "Aboveground LPG Tank Installation"
        spec: "Per Table 11.5 - on ground, outdoor, open to sky at grade. Not within 3 m of flammable-liquid dike walls. Roof / podium tanks treated as Roof-Mounted Tanks per Section 2.5.4."
        detail: "Concrete / masonry foundations capable of withstanding loaded weight, wind and seismic loads. Saddle supports allow expansion. Bottom of tank ≤ 300 mm above foundation. Tank secured to building structure. Coated/protected to minimize corrosion. Stacking NOT permitted."
      - name: "Maximum Quantity (72,000 Gal per location)"
        spec: "Per Table 11.5 item 3"
        detail: "Maximum aggregate quantity 72,000 Gal in one location. Larger inventories must be subdivided into 72,000-Gal-or-less groups separated by 15 m. Quantities exceeding require special CD approval."
      - name: "Tank Separation Distances"
        spec: "Per Tables 11.6.a (general), 11.6.b (industrial), 11.6.c (flammable liquid), 11.6.d (liquid oxygen)"
        detail: "Industrial tanks may use 1-hr fire-rated fire walls (min 2 m height) constructed around LPG tanks to reduce required clearances. Default separation otherwise per the relevant tables."
      - name: "AC / Air-Intake Clearance"
        code_ref: "Ch 11, #2.5.3 / Table 11.5 item 4.vi"
        page_ref: "p.906"
        spec: "Minimum 6 m from any aboveground LPG tank to AC condenser units, mechanical / fresh-air intakes, or balanced-flue outlets."
        detail: "Explicit numeric clearance from Table 11.5 item 4 (vi). The 6 m is measured from the tank surface to the nearest air-intake / AC unit / flue outlet to prevent vapour ingress into building HVAC."
      - name: "Fire Hydrant / FFE / FCC Clearance"
        code_ref: "Ch 11, #2.5.3 / Table 11.5 item 4.vii"
        page_ref: "p.906"
        spec: "Minimum 10 m from any aboveground LPG tank to fire hydrants, fire-fighting equipment (FFE), and the Fire Command Centre (FCC)."
        detail: "Explicit numeric clearance from Table 11.5 item 4 (vii). Ensures fire-department water and command access remain usable in the event of an LPG incident."
      - name: "Overhead Power Line Clearance"
        code_ref: "Ch 11, #2.5.3 / Table 11.5 item 4.viii"
        page_ref: "p.906"
        spec: "Minimum 1.8 m horizontal / vertical clearance from any aboveground LPG tank to overhead power lines rated greater than 600 V."
        detail: "Explicit numeric clearance from Table 11.5 item 4 (viii). Applies to power lines > 600 V only; lower-voltage utility drops are governed by the general ignition-source clearance."
      - name: "Vegetation-Free Zone"
        code_ref: "Ch 11, #2.5.3 / Table 11.5 item 4.ix"
        page_ref: "p.906"
        spec: "3 m radius around any aboveground LPG tank shall be free of vegetation, dry grass, weeds, brush, or combustible debris."
        detail: "Explicit numeric clearance from Table 11.5 item 4 (ix). Vegetation control is a continuing maintenance obligation - inspected during the quarterly Table 11.14 walk-through."
      - name: "Gas-Leak Detection System"
        spec: "Per Section 2.6 - Civil Defence approved gas-leak detector"
        detail: "Approved gas-leak detection in tank area, interfaced with FACP and emergency shut-off valves."
      - name: "Two-Stage Pressure Regulation"
        spec: "First stage 5 psi (0.35 bar) commercial / 75 mbar residential; second stage 0.5 psi (0.035 bar)"
        detail: "Both regulators required. Vent piping to atmosphere. Excess flow / pressure-relief valves on tank."
      - name: "Tank Fire Protection (cross-reference Ch 9 #4.15 Table 9.31.B)"
        detail: "Aboveground LPG tanks per Ch 9 require automatic Water Deluge Spray (Section 3.8) where building is sprinklered, or Dry Deluge Spray with breeching inlet otherwise. Exempt only if tank is > 6 m from any structure."

  # ----- Central LPG Infrastructure (has_gas_infra_connection flag) -----
  - id: lpg_central_distribution
    match: {has_gas_infra_connection_is: true}
    section: "Ch 11, #2.5.2 / Table 11.4"
    page: "p.900-901"
    systems:
      - name: "LPG Piping Distribution"
        spec: "Per Table 11.4 - vapour-phase only inside building; liquid-phase permitted only up to compound walls"
        detail: "No liquid-phase LPG inside the building. Two-stage pressure regulators required (first to 5 psi or 75 mbar, second to 0.5 psi). LPG piping shall NOT pass through: exit routes / stairs / corridors / lobbies, public seating, firefighting lobbies, fire command centre, fire pump room, control rooms, lift shafts, sprinkler valve rooms, garbage chutes, cavity walls, HVAC ducts, building/equipment foundations, electrical switchgear ducts, transformers, generator rooms, garbage / refrigeration chambers, cold rooms, or any pipes/vessels containing flammable / oxidizing / corrosive / hazardous materials."
      - name: "Dedicated Fire-Rated LPG Shafts"
        spec: "1-hr fire resistance rating for non-highrise; 2-hr rating for highrise"
        detail: "Masonry / steel / concrete / approved fire-rated particle board. All penetrations firestopped. Naturally ventilated to open air."
      - name: "Pipe-in-Pipe Containment Arrangement"
        spec: "Where LPG piping passes through basements / studio apartments / show kitchens or where containment required"
        detail: "Outer containment pipe vented to atmosphere; leak in inner pipe is captured and routed to safe location."
      - name: "Emergency Shut-off Valves (ESV)"
        code_ref: "Ch 11, #2.3.14 / Table 11.4 #7"
        page_ref: "p.903"
        spec: "ESVs required at: (a) knockout pot, (b) Pressure Reducing Distribution Panel (PRDP) local to each kitchen / apartment (Stage 2), and (c) building entry / utility takeoff."
        detail: "Solenoid / motorized ESVs interfaced with gas-leak detection system, fire alarm system, and manual emergency shut-off pushbuttons at exits. Per code §2.3.14 + Table 11.4 #7, the mandatory ESV locations are the knockout pot, the PRDP serving each kitchen / apartment (Stage-2 local isolation), and at the point of building entry. Earlier guidance suggesting an ESV at 'every floor / risk-zone boundary' is NOT supported by the code text and has been corrected."
      - name: "Manual Master Shut-off Valve at Building Entry"
        spec: "Per Section 2.5"
        detail: "Accessible to fire department at building perimeter."

  # ----- Villa / Domestic Gas Cylinders (has_gas_cylinders_villa flag) -----
  - id: lpg_cylinders_villa
    match: {has_gas_cylinders_villa_is: true}
    section: "Ch 11, #2.4.1 / Table 11.1 (outdoor) + Table 11.2 (indoor)"
    page: "p.893-895"
    systems:
      - name: "Outdoor LPG Cylinder Installation Location"
        spec: "Per Table 11.1 item 1 - above ground, outdoors, well-ventilated, on firm/clean/dry/level base"
        detail: "Cylinders NOT permitted on roof, terrace or basements. Sited at ground level. Not close to passageways or exits. Not against glass walls or glazing."
      - name: "Outdoor Cylinder Separation Distances"
        spec: "Per Table 11.1 item 2 (p.893)"
        detail: "3 m clearance to: any fire exit route, exit doors, exit stairs, windows, public roads, AC intake/return units, balanced flue outlets, parking, drains/shaft openings/pits, basement openings, fire accessways, assembly points, fire-truck parking slot (Table 11.1 #2.iv), and ramp openings. 10 m clearance to fire hydrants."
      - name: "Cylinder Quantity Limits"
        spec: "Per Table 11.1 item 3"
        detail: "Domestic residential: max 2 cylinders × 24 kg per group (1 main + 1 reserve, common manifold with isolation valves). Commercial: max 4 cylinders × 44 kg per group (2 main + 2 reserve). Larger quantities require special CD approval."
      - name: "Louvered Steel Enclosure"
        spec: "Per Table 11.1 item 4 + item 5"
        detail: "Locked against tampering / accidental damage. Steel barricades where near parking / vehicle ramps / roads. Total free-area of louvers ≥ 50% of front-side area for ventilation."
      - name: "Gas-Leak Detection in Cylinder Enclosure"
        spec: "Per Section 2.6"
        detail: "Approved gas-leak detection in the cylinder area / compartment, interfaced with shut-off valves."
      - name: "Two-Stage Pressure Regulation"
        spec: "First stage 75 mbar residential; second stage 0.5 psi (0.035 bar)"
        detail: "Both regulators between cylinder and appliance. Flexible connector permitted only at appliance end."
      - name: "Indoor Cylinder Restrictions (where applicable)"
        spec: "Per Table 11.2 item 3 (p.898): MAXIMUM 1 cylinder of 24 kg allowed indoors; 1 additional 24 kg spare allowed but NOT RECOMMENDED."
        detail: "Indoor LPG cylinders (where outdoor installation not feasible) restricted to designated rooms with mechanical ventilation, gas-leak detection, ESVs, and 1-hr fire-rated separation. Hard quantity cap per Table 11.2 item 3 (p.898): the maximum quantity allowed indoors is 1 cylinder of 24 kg in service; 1 additional 24 kg cylinder is permitted as a spare but is NOT recommended. Larger inventories must be relocated to an outdoor enclosure or a central tank."

  # ----- NO GAS SYSTEM (none of the flags ticked) -----
  - id: lpg_no_gas_system
    match:
      has_lpg_tanks_is: false
      has_gas_infra_connection_is: false
      has_gas_cylinders_villa_is: false
      has_lpg_cylinders_food_truck_is: false
    section: "Ch 11"
    page: "p.877-939"
    systems:
      - name: "No Gas System Present"
        required: not_required
        detail: "Building has no LPG tanks, no gas-infrastructure connection, no LPG cylinders, and no food-truck LPG. Chapter 11 LPG Code of Practice does NOT apply to this building. If a gas system is added later, Ch 11 design and installation requirements must be implemented and re-submitted to Civil Defence."

# ---------- ADD-ON VARIANTS: layer additional requirements per tank/cylinder type
addons:
  - id: lpg_addon_roof_mounted_tank
    flag: has_lpg_tank_roof_mounted
    systems:
      - name: "Roof-Mounted LPG Tank Installation (Table 11.7)"
        code_ref: "Ch 11, #2.5.4 / Table 11.7"
        page_ref: "p.909-910"
        spec: "Roof installation - dedicated tank pad, ventilation, drainage, structural load assessment"
        detail: "Roof-mounted LPG tanks must be installed on dedicated pads with structural verification. Tanks at elevated podiums also fall under this category. Where tanks are aesthetic-covered, enclosure must be fully ventilated or perforated."
      - name: "Roof-Mounted LPG Tank Maximum Quantity"
        code_ref: "Ch 11, #2.5.4 / Table 11.7.2.i"
        page_ref: "p.909-910"
        spec: "Maximum 2,000 Gal aggregate (or 1,000 Gal if construction does not comply with Table 11.7.2.i)"
        detail: "STRICT QUANTITY LIMIT - dramatically lower than aboveground (which allows 72,000 Gal). Quantities exceeding require special CD approval."
      - name: "Mall 4,000 Gal Allowance"
        code_ref: "Ch 11, #2.5.4 / Table 11.7 #3.iii"
        page_ref: "p.909"
        spec: "For Malls and developments larger than 20,000 m² with central LPG tanks: 4,000 Gal allowed on roof, installed as two 2,000 Gal LPG tanks spaced 15 m apart."
        detail: "Per Table 11.7 #3.iii (p.909), the standard 2,000 Gal cap is relaxed for Malls / developments greater than 20,000 m² that operate central LPG tanks. The roof inventory may go up to 4,000 Gal aggregate ONLY when split into two 2,000 Gal tanks installed at least 15 m apart. Does NOT apply to a single tank > 2,000 Gal."
      - name: "Super-Highrise Prohibition (Building Height > 90 m)"
        code_ref: "Ch 11, §2.5.1.3"
        page_ref: "p.900"
        spec: "LPG tanks on Super-Highrise buildings (height greater than 90 m) are NOT ALLOWED."
        detail: "Hard prohibition per code §2.5.1.3 (p.900): LPG tanks on super-highrise buildings (height greater than 90 m) shall not be installed. Where the building height exceeds 90 m, the roof-mounted LPG tank flag is incompatible and the design must instead use a ground-level / podium tank or central distribution from a remote tank farm. Verify against the building's reported height_m before approving any roof-tank configuration."
      - name: "Roof-Mounted LPG Tank Separation Distances (Table 11.8)"
        code_ref: "Ch 11, #2.5.4 / Table 11.8"
        page_ref: "p.910"
        detail: "Separation measured from tank surface to: any structure, building, parapet wall, compound wall, other equipment, exit stairs, fire access way, assembly points, parking, drains, shaft openings, pits, basement openings. Separations stricter than aboveground-at-grade because of vertical fire spread risk."
      - name: "Tank Fire Protection (cross-reference Ch 9, #4.15)"
        detail: "Roof-mounted tanks: automatic Water Deluge Spray cooling per Section 3.8 if building is sprinklered; dry-type deluge with breeching inlet otherwise."

  - id: lpg_addon_underground_mounded
    flag: has_lpg_tank_underground_mounded
    systems:
      - name: "Underground / Mounded LPG Tank Installation (Table 11.9)"
        code_ref: "Ch 11, #2.5.5 / Table 11.9"
        page_ref: "p.913-914"
        spec: "ASME-listed pressure vessel, cathodic protection, vent risers to atmosphere, monitoring access shaft"
        detail: "Underground (buried) or mounded (covered with earth) tanks. Cathodic protection mandatory to prevent corrosion. Monitoring shaft for inspection. Vent piping vertical to atmosphere; high-point relief."
      - name: "Maximum Quantity (Underground/Mounded)"
        code_ref: "Ch 11, #2.5.5 / Table 11.9 item 3"
        page_ref: "p.917"
        spec: "Maximum 180,000 Gal aggregate for underground or mounded LPG tanks at one location."
        detail: "Per Table 11.9 item 3 (p.917): the maximum allowed quantity for underground or mounded LPG tanks is 180,000 Gal. More than 180,000 Gal shall be subdivided into 180,000-Gal-or-less groups installed 15 m apart. Quantities beyond require special Civil Defence approval. Tool MUST flag any underground / mounded design exceeding 180,000 Gal aggregate per location."
      - name: "Underground / Mounded LPG Tank Separation Distances (Table 11.10.a)"
        code_ref: "Ch 11, #2.5.5 / Table 11.10.a"
        page_ref: "p.919"
        detail: "Separation measured from PRESSURE-RELIEF VALVE and FILLING CONNECTIONS (not tank surface) to: any point of structure, building, compound wall, public road, equipment, exit roads, fire-truck accessway, assembly points, parking, drains, shaft openings, basement openings. Different reference point reflects the practical fire risk at relief / fill points."
      - name: "ASME Container Reduction Allowance (Table 11.10.b)"
        code_ref: "Ch 11, #2.5.5 / Table 11.10.b"
        page_ref: "p.919-920"
        spec: "Up to 50% reduction in separation distance permitted for ASME-listed pressure vessels meeting specific construction criteria"
        detail: "ASME-listed containers complying with Table 11.10.b construction and venting requirements may use reduced separation distances - significant cost / land savings for compliant designs."
      - name: "Cathodic Protection + Corrosion Monitoring"
        spec: "Mandatory for underground installations"
        detail: "Sacrificial anode or impressed-current cathodic protection. Annual potential measurement and corrosion-rate monitoring."

  - id: lpg_addon_cylinders_indoor
    flag: has_lpg_cylinders_indoor
    systems:
      - name: "Indoor LPG Cylinder Installation (Table 11.2)"
        code_ref: "Ch 11, #2.4.2 / Table 11.2"
        page_ref: "p.896-897"
        spec: "Dedicated cylinder room with mechanical ventilation, gas-leak detection, ESVs, 1-hr fire-rated separation"
        detail: "Indoor cylinder room is permitted ONLY where outdoor installation is not feasible. Stricter than outdoor: dedicated room with continuous mechanical ventilation, low-level + high-level gas-leak detectors, emergency shut-off valves with manual pushbutton at the room exit, 1-hour fire-rated separation from rest of building, fire damper / smoke seal in any duct penetrations."
      - name: "Indoor Cylinder Quantity Limits (stricter than outdoor)"
        code_ref: "Ch 11, #2.4.2 / Table 11.2.3"
        page_ref: "p.897"
        spec: "Stricter quantity limits than outdoor cylinder enclosures - per Table 11.2 item 3"
        detail: "Indoor cylinder room quantity limits are tighter than outdoor enclosures because of the higher consequence of leaks indoors. Larger quantities require central tank with outdoor location."
      - name: "Mechanical Ventilation (Indoor Cylinder Room)"
        spec: "Continuous, low-level extraction (LPG is heavier than air)"
        detail: "Extraction grilles at floor level (within 150 mm of floor) since LPG vapour is heavier than air and accumulates low. Ventilation rate per Section 2.6 / Ch 10. Interlocked with gas-leak detection."

  - id: lpg_addon_food_truck
    flag: has_lpg_cylinders_food_truck
    systems:
      - name: "Food Truck LPG Cylinder Installation (Table 11.3)"
        code_ref: "Ch 11, #2.4.3 / Table 11.3"
        page_ref: "p.898-899"
        spec: "Mounted in dedicated ventilated compartment outside the cooking area; secured against vehicle motion. Maximum 2 cylinders of 12 kg each (Table 11.3 item 2, p.899)."
        detail: "Food truck cylinder mounting per Table 11.3: cylinder compartment ventilated to outside, separated from cooking area, secured to vehicle frame to prevent shifting during transit. Quantity cap per Table 11.3 item 2 (p.899): exactly 2 cylinders of 12 kg each (24 kg aggregate)."
      - name: "Composite Cylinders ONLY"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.iii"
        page_ref: "p.899"
        spec: "Cylinders shall be composite type only (Table 11.3 #3.iii)."
        detail: "Steel cylinders are NOT permitted on food trucks. Composite (translucent / fibre-wound) cylinders are mandatory because they are lighter, do not BLEVE in the same way, and allow visual liquid-level inspection. Hard requirement, not a preference."
      - name: "Twin Tires for Truck Rear"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.ii"
        page_ref: "p.899"
        spec: "Twin (dual) tyres required on the rear axle of the food truck (Table 11.3 #3.ii)."
        detail: "Twin rear tyres improve vehicle stability under the load of the cooking platform and the cylinder enclosure and provide a fail-safe in the event of a tyre blow-out. Verified during the annual Civil-Defence inspection."
      - name: "Battery-Operated Heat Detector over Cooking Platform"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.viii"
        page_ref: "p.899"
        spec: "Battery-operated heat detector mounted directly over the cooking platform (Table 11.3 #3.viii)."
        detail: "Independent of the truck's electrical system - the detector remains functional when the engine is off and the cooking platform is in use. Local audible alarm at the unit. Replace battery and test annually."
      - name: "Electrical Wiring in Metallic Containment Pipe"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.ix"
        page_ref: "p.899"
        spec: "All electrical wiring inside the food truck concealed within metallic containment pipe / conduit (Table 11.3 #3.ix)."
        detail: "Metallic conduit / containment pipe protects wiring from mechanical damage on a moving vehicle and contains arcing in case of insulation failure. Plastic / flexible PVC conduit is not acceptable."
      - name: "Steel Guard at Exterior of Cylinder Enclosure"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.vi"
        page_ref: "p.899"
        spec: "Steel guard / barricade installed at the exterior of the cylinder enclosure (Table 11.3 #3.vi)."
        detail: "Protects the cylinder enclosure against impact from other vehicles, kerb strikes, and accidental damage during food-truck operation at events. Steel construction, secured to the truck chassis."
      - name: "Welded Steel Piping with Flexible Hose as Short as Possible"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.iv"
        page_ref: "p.899"
        spec: "LPG piping between cylinder enclosure and appliance: welded steel; flexible hose used ONLY at the appliance connection and kept as SHORT AS POSSIBLE (Table 11.3 #3.iv)."
        detail: "Welded steel piping is the primary distribution; flexible hose is permitted only at the final appliance connection where vibration / movement is unavoidable, and shall be kept to the minimum length practical. No threaded steel runs, no rubber hose for distribution."
      - name: "ESV Switch at BOTH Doors of Truck Interior"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 #3.v"
        page_ref: "p.899"
        spec: "Manual Emergency Shut-off Valve (ESV) switch installed INSIDE the food truck at BOTH interior doors (Table 11.3 #3.v)."
        detail: "CORRECTED: ESV pushbuttons are located INSIDE the truck adjacent to BOTH interior doors so the operator can isolate the LPG supply from either escape route during an incident. (Earlier guidance suggesting the ESV is 'outside the truck' was incorrect and has been replaced.) The ESVs shall close the LPG supply at the cylinder bank when activated, and are additionally interfaced with the gas-leak detector and the heat detector over the cooking platform."
      - name: "Food Truck Safety Provisions (Table 11.3.3)"
        code_ref: "Ch 11, #2.4.3 / Table 11.3 item 3"
        page_ref: "p.899"
        detail: "Approved gas-leak detector in cylinder compartment + cooking area. Fire-suppression system over cooking surface (Wet Chemical per Ch 9 #4.15.A). Annual Civil-Defence inspection certificate required for operation."

  - id: lpg_addon_prdp_tapping
    flag: has_gas_infra_connection
    systems:
      - name: "PRDP (Pressure Reducing Distribution Panel) Tapping (Table 11.11)"
        code_ref: "Ch 11, #2.5.6 / Table 11.11"
        page_ref: "p.921-922"
        spec: "Per Table 11.11 - tapping point design, isolation valves, pressure regulation stages, leak monitoring"
        detail: "Wherever a building taps from a central / municipal LPG distribution network, the PRDP (Pressure Reducing Distribution Panel, per code §2.5.6, p.921) is the demarcation between utility and consumer. Requirements: dedicated tapping vault or above-ground enclosure, double-block-and-bleed isolation, two-stage pressure regulation (utility side and consumer side), pressure-relief venting to safe location, leak detection at the PRDP. Mandatory for all LPG installations downstream of a central network."

  # NOTE: Table 11.13 (Point of Transfer and Exposures, p.926) is not encoded - no schema flag
  # exists for bulk LPG delivery tanker parking / transfer separations (has_lpg_liquid_transfer).
  # If a future schema flag is added, Table 11.13 + §4.8 (p.929) tanker parking requirements
  # should be encoded as an additional addon here.
  - id: lpg_addon_flame_effect
    flag: has_lpg_flame_effect
    systems:
      - name: "Flame Effect LPG Installation (Table 11.12)"
        code_ref: "Ch 11, #4 / Table 11.12"
        page_ref: "p.923-924"
        spec: "6 m clearance to exits/doors/stairs/windows; 3 m to ignition sources; manual shut-off valve in accessible location; portable extinguishers per Table 11.12 #6.ii (see dedicated entry below); fixed FP per risk assessment + Civil Defence evaluation"
        detail: "Flame-effect shows in front of audience (indoor or outdoor entertainment): LPG supply ONLY available during operation. Manual shut-off valve in accessible location closes all LPG supply to flame-effect control system. Low-pressure interlock prevents flame-out re-ignition. Wiring MICC or 2-hour fire rated 2x1.5 mm. Permanent installations require fixed fire-protection per risk assessment + Civil Defence approval. Cylinders shall NOT be connected/disconnected during the show. Hazard-free area declared by operation supervisor before triggering effects."
      - name: "Flame Effect Portable Extinguishers (Table 11.12 #6.ii)"
        code_ref: "Ch 11, #4 / Table 11.12 #6.ii"
        page_ref: "p.924"
        spec: "At least two B:C dry-chemical extinguishers (minimum 9 kg each) AND pressurized water extinguishers, placed on opposite sides of the flame show area."
        detail: "Per Table 11.12 #6.ii (p.924): the flame-show area shall be protected by at least two approved portable B:C dry-chemical extinguishers having a minimum capacity of 9 kg each, AND pressurized water extinguishers. Both extinguisher types are required (not a choice). They shall be placed on opposite sides of the flame show area so that one set is always accessible regardless of the location of an incident. Earlier guidance listing only the dry-chemical extinguishers was incomplete."

